function catLeg(g,hipX,hipY,phase,amt,color,w){
  var footX=hipX+Math.sin(phase)*5*amt;
  var footY=-Math.max(0,Math.sin(phase+Math.PI/2))*4*amt;
  var kneeX=(hipX+footX)/2+1.5, kneeY=(hipY+footY)/2;
  g.strokeStyle=color; g.lineWidth=w; g.lineCap='round';
  g.beginPath(); g.moveTo(hipX,hipY); g.quadraticCurveTo(kneeX,kneeY,footX,footY); g.stroke();
  g.fillStyle=color; g.beginPath(); g.ellipse(footX,footY-0.4,2.5,1.5,0,0,Math.PI*2); g.fill();
}
function drawCat(g,cat){
  var ds=depthScale(cat.y), s=ds*1.04, wet=!!cat.inWater;
  var P={fur:'#e8913f',dark:'#c9762a',cream:'#f7e6cf',stripe:'#b9661c',ear:'#eda07f',earIn:'#e89f83',nose:'#d56a72',eye:'#4a8a3c'};
  g.save();
  g.translate(cat.x,cat.y);
  g.fillStyle='rgba(45,55,45,'+(wet?0.06:0.16)+')';
  g.beginPath(); g.ellipse(0,0,23*s,5*s,0,0,Math.PI*2); g.fill();
  g.scale(cat.facing,1);
  g.translate(0,-(cat.hop||0)*s);
  g.scale(s,s);

  var cr=cat.crouch||0, lunge=cat.lunge||0, amt=clamp(cat.speed/120,0.12,1);
  var bodyY=-16+cr*3.5;
  var rearX=-15, rearY=bodyY-1-cr*1.2;
  var shoulderX=12, shoulderY=bodyY+1+cr*3;
  var headX=23+lunge*8, headY=-25+cr*9+lunge*3;
  var ph=cat.walkPhase;

  // far legs (behind body) — slightly darker
  catLeg(g,rearX+2,rearY+8,ph+Math.PI*0.5,amt,P.dark,4.2);
  catLeg(g,shoulderX-1,shoulderY+7,ph+Math.PI*1.5,amt,P.dark,4.2);

  // tail (behind), with a swish and darker tip
  var sw=Math.sin(cat.tail)*7;
  g.strokeStyle=P.fur; g.lineWidth=6.4; g.lineCap='round';
  var t0x=rearX-5,t0y=rearY-1, t1x=rearX-19,t1y=rearY-8+sw*0.5, t2x=rearX-22+sw*0.5,t2y=rearY-22+sw;
  g.beginPath(); g.moveTo(t0x,t0y); g.quadraticCurveTo(t1x,t1y,t2x,t2y); g.stroke();
  g.strokeStyle=P.stripe; g.lineWidth=5.4; g.lineCap='round';
  g.beginPath(); g.moveTo(lerp(t1x,t2x,0.55),lerp(t1y,t2y,0.55)); g.quadraticCurveTo(t2x,t2y,t2x,t2y); g.stroke();

  // --- BODY ---
  g.fillStyle=P.fur;
  g.beginPath(); g.ellipse(rearX,rearY,11.5,10.5,0.1,0,Math.PI*2); g.fill();   // haunch
  g.beginPath(); g.ellipse(-1,bodyY,19,8.6,0,0,Math.PI*2); g.fill();           // barrel
  g.beginPath(); g.ellipse(shoulderX,shoulderY-1,9.2,8.2,0,0,Math.PI*2); g.fill(); // chest
  g.fillStyle=P.cream;
  g.beginPath(); g.ellipse(2,bodyY+5.2,14,4.4,0,0,Math.PI*2); g.fill();        // belly
  // tabby back stripes
  g.strokeStyle=P.stripe; g.lineWidth=1.8; g.lineCap='round';
  for(var i=0;i<4;i++){ var bx=-8+i*7; g.beginPath(); g.moveTo(bx,bodyY-8.2); g.quadraticCurveTo(bx-2,bodyY-3,bx-1,bodyY-1); g.stroke(); }

  // near legs (in front of body)
  catLeg(g,rearX+3,rearY+8,ph+Math.PI,amt,P.fur,4.6);
  catLeg(g,shoulderX,shoulderY+7,ph,amt,P.fur,4.8);

  // --- NECK + HEAD ---
  g.fillStyle=P.fur;
  g.beginPath(); g.moveTo(shoulderX-2,shoulderY-6);
  g.quadraticCurveTo(headX-6,headY+6,headX-2,headY+5);
  g.lineTo(headX+3,headY+7); g.quadraticCurveTo(shoulderX+5,shoulderY-1,shoulderX+4,shoulderY-7); g.closePath(); g.fill();

  // ears (flatten back when stalking/pouncing)
  var earBack=clamp(cr,0,1);
  function ear(sign){
    g.save(); g.translate(headX+sign*4.4,headY-5.6); g.rotate(sign*(0.15+earBack*0.5));
    g.fillStyle=P.fur; g.beginPath(); g.moveTo(-3.4,2); g.lineTo(sign*0.6,-7.2-(1-earBack)*1.5); g.lineTo(3.4,2); g.closePath(); g.fill();
    g.fillStyle=P.earIn; g.beginPath(); g.moveTo(-1.7,1.2); g.lineTo(sign*0.4,-4.4); g.lineTo(1.9,1.2); g.closePath(); g.fill();
    g.restore();
  }
  ear(-1); ear(1);
  // head
  g.fillStyle=P.fur; g.beginPath(); g.ellipse(headX,headY,8.2,7.4,0,0,Math.PI*2); g.fill();
  // muzzle
  g.fillStyle=P.cream; g.beginPath(); g.ellipse(headX+4.5,headY+3.2,4.2,3.2,0,0,Math.PI*2); g.fill();
  // forehead stripes
  g.strokeStyle=P.stripe; g.lineWidth=1.3;
  g.beginPath(); g.moveTo(headX-1.5,headY-7); g.lineTo(headX-1,headY-3); g.moveTo(headX-4,headY-6.2); g.lineTo(headX-3,headY-3); g.moveTo(headX+1.5,headY-6.6); g.lineTo(headX+1.4,headY-3); g.stroke();
  // nose + mouth
  g.fillStyle=P.nose; g.beginPath(); g.moveTo(headX+7.4,headY+1.6); g.lineTo(headX+8.8,headY+1.6); g.lineTo(headX+8.1,headY+2.8); g.closePath(); g.fill();
  g.strokeStyle=P.dark; g.lineWidth=0.8; g.beginPath(); g.moveTo(headX+8.1,headY+2.8); g.lineTo(headX+8.1,headY+4); g.moveTo(headX+8.1,headY+4); g.quadraticCurveTo(headX+6.5,headY+4.6,headX+5.6,headY+3.8); g.stroke();
  // eye (almond; a slit when stalking; line when blinking)
  var ex=headX+2.2, ey=headY-0.6;
  if(cat.blink>0){ g.strokeStyle=P.dark; g.lineWidth=1; g.beginPath(); g.moveTo(ex-2,ey); g.quadraticCurveTo(ex,ey+1,ex+2,ey); g.stroke(); }
  else {
    g.fillStyle=P.eye; g.beginPath(); g.ellipse(ex,ey,2.5,cr>0.5?1.5:2.6,0,0,Math.PI*2); g.fill();
    g.fillStyle='#1c1c14'; g.beginPath(); g.ellipse(ex+0.4,ey,cr>0.5?0.7:1.1,cr>0.5?1.4:1.8,0,0,Math.PI*2); g.fill();
    g.fillStyle='rgba(255,255,255,0.85)'; g.beginPath(); g.ellipse(ex-0.5,ey-0.9,0.6,0.7,0,0,Math.PI*2); g.fill();
  }
  // whiskers
  g.strokeStyle='rgba(255,255,255,0.7)'; g.lineWidth=0.6;
  g.beginPath();
  g.moveTo(headX+5.5,headY+2.2); g.lineTo(headX+13,headY+0.6);
  g.moveTo(headX+5.5,headY+3); g.lineTo(headX+13,headY+3.4);
  g.moveTo(headX+5.5,headY+3.6); g.lineTo(headX+12.5,headY+6); g.stroke();

  if(wet){ // waterline across the lower body while he wades
    g.fillStyle='rgba(95,162,168,0.55)'; g.beginPath(); g.ellipse(-1,bodyY+9,21,5.2,0,0,Math.PI*2); g.fill();
    g.fillStyle='rgba(255,255,255,0.20)'; g.beginPath(); g.ellipse(-1,bodyY+7.6,20,1.9,0,0,Math.PI*2); g.fill();
  }
  g.restore();
}
function drawHeart(g,x,y,s,a){
  g.save(); g.globalAlpha=a; g.fillStyle='#ef8aa0';
  g.beginPath(); g.moveTo(x,y+s*0.3);
  g.bezierCurveTo(x,y,x-s,y,x-s,y+s*0.35);
  g.bezierCurveTo(x-s,y+s*0.8,x,y+s*1.1,x,y+s*1.3);
  g.bezierCurveTo(x,y+s*1.1,x+s,y+s*0.8,x+s,y+s*0.35);
  g.bezierCurveTo(x+s,y,x,y,x,y+s*0.3);
  g.fill(); g.restore();
}
function drawParticles(g){
  for(var i=0;i<state.particles.length;i++){
    var p=state.particles[i], kk=p.t/p.life;
    if(p.type==='crumb'){
      g.globalAlpha=clamp(1-kk,0,1); g.fillStyle='#8a5f31';
      g.beginPath(); g.ellipse(p.x,p.y,p.r,p.r,0,0,Math.PI*2); g.fill();
    } else if(p.type==='heart'){
      var pop=Math.min(1,p.t/0.18), sc=lerp(0.3,1,pop)*p.s;
      drawHeart(g,p.x,p.y,sc,clamp(1-kk,0,1)*0.9);
    } else if(p.type==='ring'){
      var rr=2+(p.maxR-2)*kk;
      g.globalAlpha=clamp(1-kk,0,1)*0.5; g.strokeStyle='rgba(255,255,255,0.9)'; g.lineWidth=1.4;
      g.beginPath(); g.ellipse(p.x,p.y,rr,rr*0.5,0,0,Math.PI*2); g.stroke();
    } else if(p.type==='drop'){
      var fall=p.vy>0;                                   // streak as it falls, bead as it rises
      g.globalAlpha=clamp(1-kk*0.5,0,1)*0.85; g.fillStyle='rgba(150,206,228,0.95)';
      g.beginPath(); g.ellipse(p.x,p.y,p.r,p.r*(fall?1.7:1.2),0,0,Math.PI*2); g.fill();
    } else if(p.type==='sparkle'){
      var sa=Math.sin(Math.min(1,kk)*Math.PI), sz=p.s*(0.5+0.5*sa);   // twinkle in and out — a little 4-point star
      g.save(); g.translate(p.x,p.y); g.rotate(p.rot); g.globalAlpha=sa;
      g.fillStyle='rgba(255,225,120,0.95)';
      g.beginPath();
      for(var sp=0;sp<4;sp++){ var a=sp/4*Math.PI*2; g.lineTo(Math.cos(a)*sz,Math.sin(a)*sz); var a2=a+Math.PI/4; g.lineTo(Math.cos(a2)*sz*0.34,Math.sin(a2)*sz*0.34); }
      g.closePath(); g.fill(); g.restore();
    } else if(p.type==='zzz'){
      var za=clamp(1-kk,0,1)*0.85, zsz=p.s*(0.7+0.3*Math.min(1,p.t/0.3));
      g.globalAlpha=za; g.fillStyle='#f3f6ff'; g.textAlign='center'; g.textBaseline='middle';
      g.font='italic '+zsz.toFixed(1)+'px Georgia, "Times New Roman", serif';
      g.fillText('z',p.x+Math.sin(p.t*3)*3,p.y);
    }
  }
  g.globalAlpha=1;
}

// ----- Weather specific drawing logic -----
function drawStarsAndMoon(g, A){
  A=(A==null?1:A);
  // Twinkling Stars
  g.fillStyle = 'rgba(255, 255, 255, 0.9)';
  for(var i=0; i<stars.length; i++){
    var sx = stars[i].x * W;
    var sy = stars[i].y * (groundTop - 5); // Keep them above the water line
    var r = 0.6 + stars[i].s * 1.2;
    g.globalAlpha = A*(0.4 + 0.6 * Math.abs(Math.sin(state.time * 1.5 + i)));
    g.beginPath(); g.arc(sx, sy, r, 0, Math.PI*2); g.fill();
  }
  g.globalAlpha = A;

  // The Moon (Top Right) with a soft halo + a few craters
  var moonX = W * 0.8;
  var moonY = groundTop * 0.4;
  g.fillStyle = 'rgba(255, 255, 255, 0.07)';
  g.beginPath(); g.arc(moonX, moonY, 40, 0, Math.PI*2); g.fill();
  g.beginPath(); g.arc(moonX, moonY, 26, 0, Math.PI*2); g.fill();
  g.fillStyle = '#fffdf0';
  g.beginPath(); g.arc(moonX, moonY, 16, 0, Math.PI*2); g.fill();
  g.fillStyle = 'rgba(214, 220, 200, 0.55)';
  g.beginPath(); g.arc(moonX-5, moonY-4, 3, 0, Math.PI*2); g.fill();
  g.beginPath(); g.arc(moonX+5, moonY+3, 2.2, 0, Math.PI*2); g.fill();
  g.beginPath(); g.arc(moonX+1, moonY-6, 1.6, 0, Math.PI*2); g.fill();
  g.globalAlpha = 1.0;
}

function drawRain(g){
  if(weather.rain){
    g.strokeStyle = 'rgba(255, 255, 255, 0.25)';
    g.lineWidth = 1;
    g.beginPath();
    for(var i=0; i<60; i++){
      var x = rand(0, W+50), y = rand(0, H);
      g.moveTo(x, y); g.lineTo(x-3, y+9);
    }
    g.stroke();
  }
}

// ----- Fireflies (night only) -----
function spawnFireflyTarget(f){ var y=clamp(f.y+rand(-55,55),groundTop+24,H-18); f.tx=clamp(rand(shoreX(y)-26,W-12),12,W-12); f.ty=y; }
function initFireflies(){ state.fireflies=[]; for(var i=0;i<16;i++){ var y=rand(groundTop+30,H-20), f={x:clamp(rand(shoreX(y),W-12),12,W-12),y:y,t:rand(0,6.283),bs:rand(1.3,2.5),vx:0,vy:0,tx:0,ty:0}; spawnFireflyTarget(f); state.fireflies.push(f); } }
function updateFireflies(dt){ if(!state.fireflies) return; for(var i=0;i<state.fireflies.length;i++){ var f=state.fireflies[i]; f.t+=dt;
  var dx=f.tx-f.x,dy=f.ty-f.y,dd=Math.hypot(dx,dy)||1; if(dd<10) spawnFireflyTarget(f);
  f.vx+=(dx/dd*14-f.vx)*Math.min(1,dt*1.5); f.vy+=(dy/dd*14-f.vy)*Math.min(1,dt*1.5);
  f.x+=f.vx*dt+Math.sin(f.t*2.1)*7*dt; f.y+=f.vy*dt+Math.cos(f.t*1.7)*7*dt; } }
function drawFireflies(g,a){ if(!state.fireflies) return;
  for(var i=0;i<state.fireflies.length;i++){ var f=state.fireflies[i], b=Math.max(0,Math.sin(f.t*f.bs)); b*=b; var al=a*b; if(al<0.02) continue;
    g.globalAlpha=al*0.22; g.fillStyle='rgba(200,255,150,1)'; g.beginPath(); g.arc(f.x,f.y,5.5,0,Math.PI*2); g.fill();
    g.globalAlpha=al*0.5; g.beginPath(); g.arc(f.x,f.y,2.6,0,Math.PI*2); g.fill();
    g.globalAlpha=al; g.fillStyle='rgba(246,255,212,1)'; g.beginPath(); g.arc(f.x,f.y,1.2,0,Math.PI*2); g.fill(); }

function render(){

  ctx.drawImage(bg,0,0,W,H); // Base pre-rendered scene

  var sky = computeSky();   // continuous day/dusk/night

  // 1. Behind the ducks: night wash (fades in), stars/moon, and a warm dawn/dusk glow
  if (sky.night > 0.02) {
     ctx.fillStyle = 'rgba(4, 10, 24, '+(0.78*sky.night).toFixed(3)+')';
     ctx.fillRect(0,0,W,H);
     if (sky.night > 0.12) drawStarsAndMoon(ctx, clamp((sky.night-0.12)/0.5,0,1));
  }
  if (sky.golden > 0.02) {
     var warm = sky.morning ? '255,168,150' : '255,138,70';   // dawn leans pink, dusk leans orange
     var gg = ctx.createLinearGradient(0,0,0,H);

     gg.addColorStop(0.4,'rgba('+warm+','+(0.24*sky.golden).toFixed(3)+')');
     gg.addColorStop(1,'rgba('+warm+','+(0.10*sky.golden).toFixed(3)+')');

  }

  drawClouds(ctx);
  drawShimmer(ctx);
  drawRipples(ctx);
  drawScene(ctx); // This renders the ducks and the food
  drawParticles(ctx);

  // 3. In front of the ducks: a gentle night tint, weather, seasonal drift, fireflies
  if (sky.night > 0.02) { ctx.fillStyle = 'rgba(4, 10, 24, '+(0.35*sky.night).toFixed(3)+')'; ctx.fillRect(0,0,W,H); }   // settle the ducks into the dark

  drawSeason(ctx);                                                  // blossom / seeds / leaves / snow for the real season
  if (sky.night > 0.12) drawFireflies(ctx, clamp((sky.night-0.12)/0.5,0,1));   // fireflies glow once it's dark enough

  drawVignette(ctx);
  updateCoinUI();
}

  var left=document.createElement('div');

  var ic=document.createElement('span'); ic.className='ic'; balEl.appendChild(ic);
  balEl.appendChild(document.createTextNode(bal.toLocaleString()+' '+CURRENCY)); shopList.appendChild(balEl);

    shopRow('Duck', 'You have '+state.duckCount+' — pond is full!', 'Max', false, null);
  } else {
    var dc=duckCost();

  var vc=visitorCost();   // same price for every unowned visitor; it climbs as you collect them
  var avail=[], owned=[];
  for(var i=0;i<VISITORS.length;i++){ (state.unlocked&&state.unlocked[VISITORS[i].id] ? owned : avail).push(VISITORS[i]); }
  var ordered=avail.concat(owned);
  for(var j=0;j<ordered.length;j++){ (function(v){
    var isOwned=!!(state.unlocked&&state.unlocked[v.id]);
    shopRow(v.name, isOwned?'Owned — drops by now and then':null,
      isOwned?'Owned':('Buy  ·  '+vc.toLocaleString()),
      !isOwned && bal>=vc,
      function(){ store.buyVisitor(v.id); hideHint(); closeShop(); },
      shopVisitors);
  })(ordered[j]); }
}
function refreshShopUI(){ if(shopModal && shopModal.classList.contains('open')) buildShop(); }
function openShop(){ buildShop(); shopModal.classList.add('open'); }
function closeShop(){ shopModal.classList.remove('open'); }
shopBtn.addEventListener('click',function(e){ e.stopPropagation(); openShop(); });
shopClose.addEventListener('click',function(e){ e.stopPropagation(); closeShop(); });
shopModal.addEventListener('click',function(e){ if(e.target===shopModal) closeShop(); });
shopModal.addEventListener('pointerdown',function(e){ e.stopPropagation(); });

// ---------- input ----------
var pressing=false,lastDropX=0,lastDropY=0,lastDropT=0;
var pressTimer=null,pressDuck=null,downX=0,downY=0,suppressDrop=false;
function evPos(e){ var r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
function doDrop(x,y){
  var cy=clamp(y,groundTop+6,H-6), cx=clamp(x,6,W-6);
  dropPellet(cx,cy); lastDropX=cx; lastDropY=cy; lastDropT=performance.now();
}
function duckHit(px,py){   // nearest duck whose torso the tap landed on
  var best=null,bd=1e9;
  for(var i=0;i<state.ducks.length;i++){ var d=state.ducks[i], sc=d.size*depthScale(d.y);
    var cx=d.x, cy=d.y-20*sc, dist=Math.hypot(px-cx,py-cy);
    if(dist<26*sc && dist<bd){ bd=dist; best=d; }
  }
  return best;
}
function clearPress(){ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; } pressDuck=null; }
canvas.addEventListener('pointerdown',function(e){
  pressing=true; suppressDrop=false; try{canvas.setPointerCapture(e.pointerId);}catch(err){}
  var p=evPos(e); downX=p.x; downY=p.y;
  pressDuck=duckHit(p.x,p.y);
  if(pressDuck){   // hold to inspect; a quick tap still feeds (on release)
    pressTimer=setTimeout(function(){ pressTimer=null; var d=pressDuck; pressDuck=null; pressing=false; suppressDrop=true; openDuckCard(d); }, 430);
  } else {
    doDrop(p.x,p.y);   // empty space → feed straight away
  }
});
canvas.addEventListener('pointermove',function(e){
  if(!pressing) return;
  var p=evPos(e), now=performance.now();
  if(pressTimer){ if(Math.hypot(p.x-downX,p.y-downY)>14){ clearPress(); doDrop(p.x,p.y); } return; }   // moved before the hold fired → it's a feed-drag
  if(!pressDuck && now-lastDropT>90 && Math.hypot(p.x-lastDropX,p.y-lastDropY)>22) doDrop(p.x,p.y);
});
canvas.addEventListener('pointerup',function(){
  if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; if(!suppressDrop) doDrop(downX,downY); }   // quick tap on a duck → feed it
  pressing=false; pressDuck=null;
});
canvas.addEventListener('pointercancel',function(){ clearPress(); pressing=false; });
canvas.addEventListener('contextmenu',function(e){ e.preventDefault(); });

// ----- Duck name card -----
var editingDuck=null;
function openDuckCard(d){
  editingDuck=d;
  document.getElementById('duckBreed').textContent=breedLabel(d.colIdx);
  document.getElementById('duckSwatch').style.background=(d.pal&&d.pal.body)||'#f4efe6';
  document.getElementById('duckAge').textContent=hatchedAgo(d.bornAt);
  duckNameInput.value=d.name||'';
  duckModal.classList.add('open');
  state.namePop={duck:d,t:0};   // float the tag above it too
  setTimeout(function(){ try{ duckNameInput.focus(); }catch(e){} },50);
}
function closeDuckCard(){ duckModal.classList.remove('open'); editingDuck=null; }
function saveDuckName(){
  if(editingDuck){ var idx=state.ducks.indexOf(editingDuck);
    if(idx>=0){ store.setDuckName(idx, duckNameInput.value.trim()); state.namePop={duck:editingDuck,t:0}; } }
  closeDuckCard(); refreshRosterIfOpen();
}
document.getElementById('duckSave').addEventListener('click',function(e){ e.stopPropagation(); saveDuckName(); });
document.getElementById('duckCloseBtn').addEventListener('click',function(e){ e.stopPropagation(); closeDuckCard(); refreshRosterIfOpen(); });
duckNameInput.addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); saveDuckName(); } });
duckModal.addEventListener('click',function(e){ if(e.target===duckModal){ closeDuckCard(); refreshRosterIfOpen(); } });
duckModal.addEventListener('pointerdown',function(e){ e.stopPropagation(); });

// ----- Flock roster -----
function drawDuckPortrait(ctx,duck,w,h){
  var keys=['x','y','facing','state','swimming','headDip','leanCur','bobCur','hop','wingFlap','blink','drowsy','pattering','legAmt'], bk={};
  keys.forEach(function(k){ bk[k]=duck[k]; });
  duck.x=0; duck.y=0; duck.facing=1; duck.state='wander'; duck.swimming=false; duck.headDip=0; duck.leanCur=0.04; duck.bobCur=0; duck.hop=0; duck.wingFlap=0; duck.blink=0; duck.drowsy=0; duck.pattering=false; duck.legAmt=0;
  ctx.clearRect(0,0,w,h);
  ctx.save(); ctx.translate(w/2,h-3); ctx.scale(0.6,0.6); duck.draw(ctx); ctx.restore();
  keys.forEach(function(k){ duck[k]=bk[k]; });
}
function buildRoster(){
  rosterList.innerHTML='';
  document.getElementById('rosterSub').textContent = state.ducks.length+(state.ducks.length===1?' duck in the pond':' ducks in the pond');
  var DPR2=Math.min(window.devicePixelRatio||1,2), cw=46, ch=54;
  for(var i=0;i<state.ducks.length;i++){ (function(d){
    var row=document.createElement('div'); row.className='rosterRow';
    var c=document.createElement('canvas'); c.width=cw*DPR2; c.height=ch*DPR2; c.style.width=cw+'px'; c.style.height=ch+'px';
    var cg=c.getContext('2d'); cg.setTransform(DPR2,0,0,DPR2,0,0); try{ drawDuckPortrait(cg,d,cw,ch); }catch(e){}
    var info=document.createElement('div'); info.className='info';
    var nm=document.createElement('div'); nm.className='rn'+(d.name?'':' unnamed'); nm.textContent=d.name||'Unnamed duck';
    var sub=document.createElement('div'); sub.className='rsub'; sub.textContent=breedLabel(d.colIdx)+' · '+hatchedAgo(d.bornAt)+' · '+(d.eaten||0)+' pellet'+((d.eaten||0)===1?'':'s')+' eaten';
    info.appendChild(nm); info.appendChild(sub);
    var btn=document.createElement('button'); btn.textContent=d.name?'Rename':'Name';
    btn.addEventListener('click',function(e){ e.stopPropagation(); openDuckCard(d); });
    row.appendChild(c); row.appendChild(info); row.appendChild(btn); rosterList.appendChild(row);
  })(state.ducks[i]); }
}
function openRoster(){ buildRoster(); rosterModal.classList.add('open'); }
function closeRoster(){ rosterModal.classList.remove('open'); }
function refreshRosterIfOpen(){ if(rosterModal && rosterModal.classList.contains('open')) buildRoster(); }
rosterBtn.addEventListener('click',function(e){ e.stopPropagation(); hideHint(); openRoster(); });
document.getElementById('rosterClose').addEventListener('click',function(e){ e.stopPropagation(); closeRoster(); });
rosterModal.addEventListener('click',function(e){ if(e.target===rosterModal) closeRoster(); });
rosterModal.addEventListener('pointerdown',function(e){ e.stopPropagation(); });

// ---------- loop ----------
function frame(now){
  if(!running) return;
  var dt=Math.min(0.045,(now-last)/1000||0); last=now;
  state.time+=dt;
  update(dt); render();
  requestAnimationFrame(frame);
}

// ---------- resize / init ----------
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=Math.max(1,window.innerWidth); H=Math.max(1,window.innerHeight);
  canvas.width=Math.floor(W*DPR); canvas.height=Math.floor(H*DPR);
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  buildScene();
  buildVignette();
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',function(){ setTimeout(resize,200); });
document.addEventListener('visibilitychange',function(){
  if(document.hidden){ running=false; audio.setActive(false); store.save(); }
  else { audio.setActive(true); if(!running){ running=true; last=performance.now(); requestAnimationFrame(frame); } }
});
// Extra safety nets for iOS screen-lock / app-switch (pagehide fires when Safari freezes the page).
window.addEventListener('pagehide',function(){ audio.setActive(false); store.save(); });
window.addEventListener('pageshow',function(){ if(!document.hidden) audio.setActive(true); });
window.addEventListener('blur',function(){ if(document.hidden) audio.setActive(false); });

resize();
updateSndIcon();
syncWeather();
rollSleepDelay();
scheduleNextVisitor();
store.load(); coinLbl.textContent=CURRENCY; updateCoinUI();   // currency: restore saved balance + label
last=performance.now();
requestAnimationFrame(frame);
requestAnimationFrame(function(){ canvas.classList.add('show'); });

})();
</script>
<script>
// Register the service worker so the pond can be installed to the home screen and work offline.
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
