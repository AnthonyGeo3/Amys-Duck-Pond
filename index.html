<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Little Duck Pond</title>
<meta name="theme-color" content="#bfe0dc">
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Duck Pond">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent; /* Fixes the blue flashing on tap */
  }
  html,body{height:100%;overflow:hidden;background:#bfe0dc;}
  body{
    font-family:'Quicksand',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    -webkit-font-smoothing:antialiased;
    user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
    touch-action:none;overscroll-behavior:none;
  }
  #scene{
    display:block;position:fixed;inset:0;width:100vw;height:100vh;
    touch-action:none;cursor:pointer;opacity:0;transition:opacity .9s ease;
  }
  #scene.show{opacity:1;}
  #ui{position:fixed;inset:0;pointer-events:none;z-index:10;}
  #title{
    position:absolute;top:calc(env(safe-area-inset-top,0px) + 16px);left:18px;
    color:rgba(38,80,76,.5);font-size:13px;font-weight:700;letter-spacing:.5px;
  }
  #snd{
    position:absolute;top:calc(env(safe-area-inset-top,0px) + 12px);right:14px;
    width:42px;height:42px;border-radius:50%;border:none;
    background:rgba(255,255,255,.58);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    box-shadow:0 4px 14px rgba(40,70,65,.18);
    pointer-events:auto;cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:#2c5450;transition:transform .15s ease,background .2s ease;
  }
  #snd:active{transform:scale(.92);}
  #snd.on{background:rgba(255,255,255,.82);}
  #snd svg{width:21px;height:21px;}
  #hint{
    position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 22px);
    transform:translateX(-50%);
    background:rgba(255,255,255,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    color:#2c5450;padding:10px 18px;border-radius:999px;
    font-size:14px;font-weight:500;letter-spacing:.2px;
    box-shadow:0 6px 20px rgba(40,70,65,.18);white-space:nowrap;
    transition:opacity .7s ease,transform .7s ease;
  }
  #hint span{display:inline-block;animation:floaty 3.4s ease-in-out infinite;}
  #hint.hide{opacity:0;transform:translateX(-50%) translateY(10px);}
  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
  @media (prefers-reduced-motion:reduce){
    #scene{transition:none;} #hint span{animation:none;}
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="ui">
    <div id="title">little duck pond</div>
    <button id="snd" aria-label="Enable gentle sounds"></button>
    <div id="hint"><span>Tap the pond to feed the ducks</span></div>
  </div>

<script>
(function(){
'use strict';

// ---------- core refs ----------
var canvas=document.getElementById('scene');
var ctx=canvas.getContext('2d');
var hintEl=document.getElementById('hint');
var sndBtn=document.getElementById('snd');

var W=0,H=0,DPR=1,groundTop=0;
var bg=null,bgctx=null,pelletSprite=null,vignetteGrad=null,waterPath=null;
var pelletSpriteSize=28;
var shorePts=[];
var ducksInit=false,running=true,last=0,hinted=false;

var shoreSeed={base:0,amp:0,freq:2,phase:Math.random()*6.283,slope:0};
var state={ducks:[],pellets:[],particles:[],ripples:[],clouds:[],lilies:[],reeds:[],time:0,lastFeed:0,sleeping:false,roost:null,
  visitor:null,nextVisitor:0,alarm:null,huddle:null,scare:0,sleepDelay:90};
// Seconds of no feeding (and no pellets left) before the flock falls asleep — re-rolled in this range each feed.
var SLEEP_MIN=60, SLEEP_MAX=120;
function rollSleepDelay(){ state.sleepDelay=rand(SLEEP_MIN,SLEEP_MAX); }
// A random cute animal wanders in once every VISITOR_MIN..VISITOR_MAX seconds, one at a time.
var VISITOR_MIN=180, VISITOR_MAX=300;

// Static star map generated once
var stars=[]; 
for(var i=0;i<80;i++) stars.push({x:Math.random(), y:Math.random(), s:Math.random()});

// -- WEATHER STATE --
var weather={loaded:false, isDay:1, rain:false};

var RUN=98, WALK=27;

// ---------- utils ----------
function clamp(v,a,b){return v<a?a:(v>b?b:v);}
function lerp(a,b,t){return a+(b-a)*t;}
function rand(a,b){return a+Math.random()*(b-a);}
function randi(a,b){return Math.floor(rand(a,b+1));}
function depthScale(y){var t=clamp((y-groundTop)/Math.max(1,(H-groundTop)),0,1);return 0.78+0.34*t;}
function shoreX(y){
  var t=clamp((y-groundTop)/Math.max(1,(H-groundTop)),0,1);
  return shoreSeed.base + Math.sin(t*Math.PI*shoreSeed.freq+shoreSeed.phase)*shoreSeed.amp + (t-0.5)*shoreSeed.slope;
}
function isWater(x,y){return x<shoreX(y);}

// ---------- weather sync ----------
async function syncWeather() {
  try {
    var res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=53.0456&longitude=-2.9755&current=is_day,weather_code&timezone=Europe%2FLondon');
    var data = await res.json();
    if(data && data.current) {
      weather.isDay = data.current.is_day;
      var wc = data.current.weather_code;
      // WMO Codes: 51-67 and 80-82 mean drizzle/rain/showers
      weather.rain = (wc >= 51 && wc <= 67) || (wc >= 80 && wc <= 82);
      weather.loaded = true;
    }
  } catch(e) { console.log('Weather sync failed, keeping defaults.', e); }
}

// ---------- duck palettes ----------
var PALS=[
 {body:'#f4efe6',belly:'#fffdf8',wing:'#e7e0d1',head:'#f4efe6',beak:'#f3ad3e',beakDark:'#d98e2a',legs:'#f3a23c',legDark:'#d98427',eye:'#3a342c',blush:'rgba(240,150,150,0.18)',neckRing:null},
 {body:'#caa06b',belly:'#f0e6d2',wing:'#b78a52',head:'#6f4f33',beak:'#586a74',beakDark:'#3d4953',legs:'#d98a45',legDark:'#b86f32',eye:'#241c14',blush:'rgba(220,140,120,0.16)',neckRing:'#f0e6d2'},
 {body:'#7c5739',belly:'#a07a56',wing:'#5f4128',head:'#5b3d27',beak:'#caa15c',beakDark:'#9e7a3e',legs:'#d98a45',legDark:'#b86f32',eye:'#1f1610',blush:'rgba(220,150,120,0.14)',neckRing:null},
 {body:'#929aa6',belly:'#cfd4db',wing:'#787f8c',head:'#5f6675',beak:'#586470',beakDark:'#3f4953',legs:'#d98a45',legDark:'#b86f32',eye:'#1d2128',blush:'rgba(200,150,160,0.12)',neckRing:null}
];

// ---------- Duck ----------
function Duck(o){
  this.x=o.x; this.y=o.y; this.pal=o.pal; this.size=o.size; this.seed=o.seed||Math.random()*6.283;
  this.vx=0; this.vy=0; this.facing=Math.random()<0.5?1:-1;
  this.speed=0; this.legAmt=0;
  this.walkPhase=Math.random()*6.283; this.bobPhase=Math.random()*6.283;
  this.leanCur=0.05; this.bobCur=0; this.headDip=0;
  this.wingFlap=0; this.hop=0; this.happyT=0; this.happyRip=0; this.pattering=false;
  this.blink=0; this.blinkTimer=rand(1.5,5);
  this.state='wander'; this.stateT=0; this.stateDur=1.5;
  this.tx=this.x; this.ty=this.y; this.targetPellet=null;
  this.swimming=isWater(this.x,this.y); this.prevSwim=this.swimming; this.wakeT=0;
  this.drowsy=0; this.zzzT=rand(0.8,3.2);
  this.panicT=0; this.panicAng=0;
  this.pickWander();
}
Duck.prototype.pickWander=function(){
  var ang=Math.random()*Math.PI*2;
  var radius=24+Math.random()*Math.min(W,H)*0.22;
  this.tx=clamp(this.x+Math.cos(ang)*radius,26,W-26);
  this.ty=clamp(this.y+Math.sin(ang)*radius,groundTop+26,H-26);
  this.state='wander'; this.stateDur=1.4+Math.random()*2.4; this.stateT=0;
};
Duck.prototype.pickIdle=function(){
  var r=Math.random();
  if(r<0.55){ this.pickWander(); }
  else if(r<0.79){ this.state='pause'; this.stateDur=0.8+Math.random()*2.0; this.stateT=0; }
  else { this.state='peck'; this.stateDur=0.5+Math.random()*0.45; this.stateT=0; }
};
Duck.prototype.startHappy=function(){
  this.state='happy'; this.stateDur=0.75+Math.random()*0.55; this.stateT=0; this.happyT=0;
  this.pattering=!this.swimming; this.happyRip=0;
  var ds=depthScale(this.y);
  spawnHeart(this.x+rand(-3,3), this.y-32*ds);
  if(Math.random()<0.6) spawnHeart(this.x+rand(-8,8), this.y-25*ds);
  if(this.swimming) spawnRipple(this.x,this.y,18);
  audio.happy();
};
Duck.prototype.startWake=function(){
  // A quick stretch/flap before they go chasing the new pellet.
  this.state='wake'; this.stateDur=0.4+Math.random()*0.2; this.stateT=0; this.targetPellet=null;
};
Duck.prototype.update=function(dt){
  this.swimming=isWater(this.x,this.y);
  if(this.swimming!==this.prevSwim){ spawnRipple(this.x,this.y,15); this.prevSwim=this.swimming; }
  this.stateT+=dt;

  var tx,ty,maxSpeed;
  if(this.state==='seek'&&this.targetPellet){ tx=this.targetPellet.x; ty=this.targetPellet.y; maxSpeed=RUN; }
  else if(this.state==='wander'){ tx=this.tx; ty=this.ty; maxSpeed=WALK; }
  else if(this.state==='toRoost'){ tx=this.tx; ty=this.ty; maxSpeed=WALK*0.6; }
  else if(this.state==='huddle'){
    if(this.panicT>0){
      // headless-chicken scatter: bolt in your own veering direction for a beat
      this.panicT-=dt; this.panicAng+=rand(-1,1)*dt*5;
      tx=clamp(this.x+Math.cos(this.panicAng)*70,18,W-18); ty=clamp(this.y+Math.sin(this.panicAng)*70,groundTop+18,H-18);
      maxSpeed=RUN*0.95;
    } else {
      // calm again: gather back into a loose huddle
      var hub=state.huddle||{x:this.x,y:this.y}, sc=state.scare||0;
      var ha=this.huddleSlot*2.399963, hr=(15+(this.huddleSlot%3)*9)*(1+sc*1.0);
      tx=clamp(hub.x+Math.cos(ha)*hr,22,W-22); ty=clamp(hub.y+Math.sin(ha)*hr,groundTop+22,H-22);
      maxSpeed=WALK*(1.4+sc*1.4);
    }
  }
  else { tx=this.x; ty=this.y; maxSpeed=0; }

  var dx=tx-this.x, dy=ty-this.y, dd=Math.hypot(dx,dy)||1;
  var desVx=0,desVy=0;
  if(maxSpeed>0&&dd>2){ desVx=dx/dd*maxSpeed; desVy=dy/dd*maxSpeed; }
  var steer=Math.min(1,dt*7);
  this.vx+=(desVx-this.vx)*steer; this.vy+=(desVy-this.vy)*steer;
  this.x+=this.vx*dt; this.y+=this.vy*dt;

  var m=18;
  if(this.x<m){this.x=m;this.vx*=-0.3;} if(this.x>W-m){this.x=W-m;this.vx*=-0.3;}
  if(this.y<groundTop+m){this.y=groundTop+m;this.vy*=-0.3;} if(this.y>H-m){this.y=H-m;this.vy*=-0.3;}

  this.speed=Math.hypot(this.vx,this.vy);
  if(Math.abs(this.vx)>6) this.facing=this.vx>0?1:-1;
  this.legAmt=Math.min(1.1,this.speed/70);

  this.walkPhase+=dt*(3+this.speed*0.10);
  this.bobPhase+=dt*(this.swimming?1.6:(4+this.speed*0.10));

  var leanTarget=this.swimming?Math.sin(state.time*1.2+this.seed)*0.025:(0.05+Math.min(1,this.speed/RUN)*0.16);
  this.leanCur+=(leanTarget-this.leanCur)*Math.min(1,dt*6);
  this.bobCur=Math.sin(this.bobPhase)*(this.swimming?2.0:(0.8+this.legAmt*1.4));

  // sleepiness: ramps up while roosting/sleeping, eases back when awake
  var drowsyTarget=this.state==='sleep'?1:(this.state==='toRoost'?0.3:0);
  var drowsyRate=drowsyTarget>this.drowsy?1.4:4.5; // drift off slowly, wake up briskly
  this.drowsy+=(drowsyTarget-this.drowsy)*Math.min(1,dt*drowsyRate);
  if(this.state==='sleep'){
    this.bobCur+=Math.sin(state.time*1.5+this.seed)*this.drowsy*0.8; // gentle breathing
    if(this.drowsy>0.6){
      this.zzzT-=dt;
      if(this.zzzT<=0){ spawnZzz(this.x+this.facing*5,this.y-34*depthScale(this.y),this.facing); this.zzzT=2.2+Math.random()*2.4; }
    }
  }

  // celebration drivers
  if(this.state==='happy'){
    this.happyT+=dt;
    if(this.swimming){
      this.pattering=false;
      this.wingFlap=Math.sin(this.happyT*15)*0.5;
      this.hop=0;
      this.bobCur+=Math.sin(this.happyT*7.5)*1.6;
      this.happyRip-=dt;
      if(this.happyRip<=0){ spawnRipple(this.x+rand(-4,4),this.y+rand(-2,2),12); this.happyRip=0.22; }
    } else {
      this.pattering=true;
      this.legAmt=0.95;
      this.walkPhase+=dt*19;
      this.wingFlap=Math.sin(this.happyT*20)*0.38;
      this.hop=Math.abs(Math.sin(this.happyT*11))*2.4;
    }
  } else if(this.state==='wake'){
    this.pattering=false;
    this.wingFlap=Math.sin(this.stateT*22)*0.4; // a sleepy stretch of the wings
    this.hop+=(0-this.hop)*Math.min(1,dt*9);
  } else if(this.state==='huddle'){
    this.pattering=false;
    var fl=Math.max(state.scare||0, this.panicT>0?0.95:0);
    if(fl>0.25){ this.wingFlap=Math.sin(this.walkPhase*3+this.seed)*0.34*fl; this.hop=Math.abs(Math.sin(this.walkPhase*2.5))*fl*1.8; }
    else { this.wingFlap+=(0-this.wingFlap)*Math.min(1,dt*9); this.hop+=(0-this.hop)*Math.min(1,dt*9); }
  } else {
    this.pattering=false;
    this.wingFlap+=(0-this.wingFlap)*Math.min(1,dt*9);
    this.hop+=(0-this.hop)*Math.min(1,dt*9);
  }

  if(this.state==='peck'){ var pr=clamp(this.stateT/this.stateDur,0,1); this.headDip=Math.sin(pr*Math.PI); }
  else if(this.state==='eat'){ var pe=clamp(this.stateT/this.stateDur,0,1); this.headDip=Math.sin(pe*Math.PI)*0.95; }
  else this.headDip+=(0-this.headDip)*Math.min(1,dt*8);

  this.blink-=dt; this.blinkTimer-=dt;
  if(this.blinkTimer<=0){ this.blink=0.12; this.blinkTimer=2.5+Math.random()*5; }

  if(this.swimming&&this.speed>8){ this.wakeT-=dt; if(this.wakeT<=0){ spawnRipple(this.x-this.facing*5*depthScale(this.y),this.y,10); this.wakeT=0.35; } }

  if(this.state==='seek'){
    if(!this.targetPellet){ this.pickWander(); }
    else {
      var pd=Math.hypot(this.targetPellet.x-this.x,this.targetPellet.y-this.y);
      var eatDist=13*depthScale(this.y);
      if(state.pellets.indexOf(this.targetPellet)>=0 && pd<eatDist && this.targetPellet.z<6){
        eatPellet(this.targetPellet,this); this.targetPellet=null; this.state='eat'; this.stateT=0; this.stateDur=0.45;
      }
    }
  } else if(this.state==='eat'){ if(this.stateT>=this.stateDur) this.startHappy(); }
  else if(this.state==='happy'){ if(this.stateT>=this.stateDur){ this.pattering=false; this.pickIdle(); } }
  else if(this.state==='wander'){ var rd=Math.hypot(this.tx-this.x,this.ty-this.y); if(rd<6||this.stateT>=this.stateDur) this.pickIdle(); }
  else if(this.state==='pause'||this.state==='peck'){ if(this.stateT>=this.stateDur) this.pickIdle(); }
  else if(this.state==='toRoost'){ var rr=Math.hypot(this.tx-this.x,this.ty-this.y); if(rr<7||this.stateT>=12){ this.state='sleep'; this.stateT=0; } }
  else if(this.state==='wake'){ if(this.stateT>=this.stateDur) this.pickIdle(); }
};
Duck.prototype.draw=function(g){
  var ds=depthScale(this.y), s=this.size*ds, p=this.pal, swim=this.swimming;
  g.save();
  g.translate(this.x,this.y);

  if(!swim){
    g.fillStyle='rgba(45,55,45,0.16)';
    g.beginPath(); g.ellipse(0,0,11.5*s,4*s,0,0,Math.PI*2); g.fill();
  }

  g.scale(this.facing,1);
  g.rotate(this.leanCur);
  g.scale(s,s);

  var bodyRx=9.2,bodyRy=21.5,headR=7.8;
  var bodyCenterY=swim?-15:-26;
  var bodyTopY=bodyCenterY-bodyRy+5;
  var headBaseX=1.8, headBaseY=bodyTopY-19;
  var dip=this.headDip;
  var hx=headBaseX+dip*7;
  var hy=headBaseY+dip*(swim?36:21);
  if(this.state==='happy'){ hy+=Math.sin(this.happyT*16)*0.9; hx+=Math.sin(this.happyT*16+1)*0.6; }
  if(this.drowsy>0.01){ hx-=this.drowsy*9; hy+=this.drowsy*16; } // sink the head back & down: bill tucked toward the wing
  var bob=this.bobCur;
  var self=this;

  function ribbon(x0,y0,cx,cy,x1,y1,w0,w1){
    var N=12,L=[],R=[],i,t,mt,px,py,dx2,dy2,len,nx,ny,w;
    for(i=0;i<=N;i++){
      t=i/N; mt=1-t;
      px=mt*mt*x0+2*mt*t*cx+t*t*x1;
      py=mt*mt*y0+2*mt*t*cy+t*t*y1;
      dx2=2*mt*(cx-x0)+2*t*(x1-cx);
      dy2=2*mt*(cy-y0)+2*t*(y1-cy);
      len=Math.hypot(dx2,dy2)||1; nx=-dy2/len; ny=dx2/len; w=(w0+(w1-w0)*t)*0.5;
      L.push([px+nx*w,py+ny*w]); R.push([px-nx*w,py-ny*w]);
    }
    g.beginPath(); g.moveTo(L[0][0],L[0][1]);
    for(i=1;i<L.length;i++) g.lineTo(L[i][0],L[i][1]);
    for(i=R.length-1;i>=0;i--) g.lineTo(R[i][0],R[i][1]);
    g.closePath();
  }

  function drawBody(){
    var topY=bodyCenterY-bodyRy+3, botY=bodyCenterY+bodyRy, wMax=bodyRx, topHalf=3.6;
    g.fillStyle=p.wing;
    var txb=-wMax*0.5, tyb=botY-3;
    g.beginPath(); g.moveTo(txb,tyb);
    g.quadraticCurveTo(txb-6,tyb-4,txb-7.5,tyb-10.5);
    g.quadraticCurveTo(txb-1.5,tyb-7,txb+3,tyb-3.5); g.closePath(); g.fill();
    var nbx=1.2, nby=topY+4, ncx=lerp(nbx,hx,0.5)+1.6, ncy=lerp(nby,hy,0.5);
    g.fillStyle=p.body; ribbon(nbx,nby,ncx,ncy,hx,hy+headR*0.5,headR*1.45,headR*0.92); g.fill();
    g.fillStyle=p.body;
    g.beginPath();
    g.moveTo(-topHalf,topY);
    g.bezierCurveTo(-wMax*0.92,topY+bodyRy*0.30,-wMax,botY-bodyRy*0.55,-wMax*0.6,botY-2);
    g.quadraticCurveTo(-wMax*0.16,botY+2.6,wMax*0.12,botY+2.3);
    g.quadraticCurveTo(wMax*0.52,botY+1.4,wMax*0.8,botY-3);
    g.bezierCurveTo(wMax*1.06,botY-bodyRy*0.5,wMax*0.72,topY+bodyRy*0.28,topHalf+1.4,topY);
    g.quadraticCurveTo(0,topY-2.6,-topHalf,topY);
    g.closePath(); g.fill();
    g.strokeStyle='rgba(70,55,40,0.10)'; g.lineWidth=1; g.stroke();
    g.fillStyle=p.belly; g.beginPath(); g.ellipse(wMax*0.34,bodyCenterY+5,wMax*0.62,bodyRy*0.66,0.05,0,Math.PI*2); g.fill();
    if(p.neckRing){
      var rt=0.58, rx=nbx+(hx-nbx)*rt, ry=nby+(hy-nby)*rt, ang=Math.atan2(hy-nby,hx-nbx);
      g.save(); g.translate(rx,ry); g.rotate(ang); g.fillStyle=p.neckRing;
      g.beginPath(); g.ellipse(0,0,headR*0.5,headR*0.85,0,0,Math.PI*2); g.fill(); g.restore();
    }
    g.save(); g.translate(-1.2,bodyCenterY+4); g.rotate(-0.16-self.wingFlap*0.7); g.translate(0,-Math.abs(self.wingFlap)*1.5);
    g.fillStyle=p.wing; g.beginPath(); g.ellipse(0,0,wMax*0.7,bodyRy*0.5,0,0,Math.PI*2); g.fill();
    g.strokeStyle='rgba(0,0,0,0.06)'; g.lineWidth=0.8;
    for(var i=-1;i<=1;i++){ g.beginPath(); g.moveTo(-3,i*3+2); g.lineTo(5,i*3+5); g.stroke(); }
    g.restore();
    g.fillStyle=p.head; g.beginPath(); g.ellipse(hx,hy,headR,headR*0.97,0,0,Math.PI*2); g.fill();
    g.fillStyle=p.blush; g.beginPath(); g.ellipse(hx+headR*0.4,hy+headR*0.3,2.1,1.4,0,0,Math.PI*2); g.fill();
    var bkx=hx+headR*0.62, bky=hy-0.6;
    g.fillStyle=p.beak; g.beginPath();
    g.moveTo(bkx-1.2,bky-2.9); g.quadraticCurveTo(bkx+8.4,bky-3.1,bkx+10.0,bky-0.6);
    g.quadraticCurveTo(bkx+9.0,bky+2.6,bkx-1.2,bky+3.0); g.quadraticCurveTo(bkx+1.4,bky,bkx-1.2,bky-2.9); g.closePath(); g.fill();
    g.strokeStyle=p.beakDark; g.lineWidth=0.8; g.beginPath(); g.moveTo(bkx-0.6,bky+0.2); g.quadraticCurveTo(bkx+6,bky-0.1,bkx+9.0,bky-0.5); g.stroke();
    g.fillStyle=p.beakDark; g.beginPath(); g.ellipse(bkx+2.4,bky-1.4,0.6,0.5,0,0,Math.PI*2); g.fill();
    var ex=hx+headR*0.28, ey=hy-headR*0.24;
    if(self.blink>0||self.drowsy>0.5){
      g.strokeStyle=p.eye; g.lineWidth=1.1; g.lineCap='round';
      g.beginPath(); g.moveTo(ex-2,ey); g.quadraticCurveTo(ex,ey+1.4,ex+2,ey); g.stroke();
    } else {
      g.fillStyle=p.eye; g.beginPath(); g.ellipse(ex,ey,2.3,2.5,0,0,Math.PI*2); g.fill();
      g.fillStyle='rgba(255,255,255,0.92)'; g.beginPath(); g.ellipse(ex-0.7,ey-0.9,0.85,0.95,0,0,Math.PI*2); g.fill();
    }
  }

  function drawLegs(){
    var pat=self.pattering;
    var stride=(pat?1.9:4.6)*self.legAmt, lift=(pat?4.4:3.4)*self.legAmt, ph=self.walkPhase;
    var hipY=bodyCenterY+bodyRy-4;
    function oneLeg(baseX,phase,color,w){
      var footX=baseX+stride*Math.sin(phase);
      var footLift=Math.max(0,Math.sin(phase+Math.PI/2))*lift;
      var footY=-footLift, hipX=baseX*0.4;
      g.strokeStyle=color; g.lineWidth=w; g.lineCap='round';
      g.beginPath(); g.moveTo(hipX,hipY); g.lineTo(footX,footY); g.stroke();
      g.fillStyle=color; g.beginPath(); g.ellipse(footX+1.4,footY,3.4,1.6,0,0,Math.PI*2); g.fill();
    }
    oneLeg(-1.7,ph+Math.PI,p.legDark,2.8);
    oneLeg(2.4,ph,p.legs,3.1);
  }

  if(swim){
    g.save();
    g.beginPath(); g.rect(-44,-150,88,150); g.clip();
    g.save(); g.translate(0,-bob); drawBody(); g.restore();
    g.restore();
    g.fillStyle='rgba(255,255,255,0.22)'; g.beginPath(); g.ellipse(0,0,bodyRx*1.5,2.6,0,0,Math.PI*2); g.fill();
    g.fillStyle='rgba(30,70,75,0.12)'; g.beginPath(); g.ellipse(0,1.4,bodyRx*1.3,1.7,0,0,Math.PI*2); g.fill();
  } else {
    drawLegs();
    g.save(); g.translate(0,-bob-this.hop); drawBody(); g.restore();
  }
  g.restore();
};

// ---------- scene building ----------
function computeLayout(){
  groundTop=Math.round(H*0.16);
  shoreSeed.base=W*0.5;
  shoreSeed.amp=Math.min(W*0.06,48);
  shoreSeed.freq=2.0;
  shoreSeed.slope=W*0.06;
}
function buildScene(){
  computeLayout();
  shorePts=[]; for(var y=groundTop;y<=H;y+=6){ shorePts.push({x:shoreX(y),y:y}); }
  waterPath=new Path2D(); waterPath.moveTo(0,groundTop);
  for(var i=0;i<shorePts.length;i++) waterPath.lineTo(shorePts[i].x,shorePts[i].y);
  waterPath.lineTo(0,H); waterPath.closePath();

  bg=document.createElement('canvas'); bg.width=Math.max(1,Math.floor(W*DPR)); bg.height=Math.max(1,Math.floor(H*DPR));
  bgctx=bg.getContext('2d'); bgctx.setTransform(DPR,0,0,DPR,0,0);
  renderStatic(bgctx);
  buildPelletSprite(); buildVignette();
  initClouds(); initLilies(); initReeds();

  if(!ducksInit){ initDucks(); ducksInit=true; }
  else { for(var k=0;k<state.ducks.length;k++){ var d=state.ducks[k]; d.x=clamp(d.x,26,W-26); d.y=clamp(d.y,groundTop+26,H-26); } }
}
function renderStatic(g){
  var sky=g.createLinearGradient(0,0,0,groundTop);
  sky.addColorStop(0,'#cfeae6'); sky.addColorStop(1,'#ecf5ed');
  g.fillStyle=sky; g.fillRect(0,0,W,groundTop);
  var sun=g.createRadialGradient(W*0.7,groundTop*0.4,2,W*0.7,groundTop*0.4,groundTop*1.6);
  sun.addColorStop(0,'rgba(255,250,230,0.5)'); sun.addColorStop(1,'rgba(255,250,230,0)');
  g.fillStyle=sun; g.fillRect(0,0,W,groundTop+30);
  g.fillStyle='#cfe2bf'; g.beginPath(); g.moveTo(0,groundTop);
  g.quadraticCurveTo(W*0.2,groundTop-16,W*0.45,groundTop-5);
  g.quadraticCurveTo(W*0.7,groundTop+5,W,groundTop-12); g.lineTo(W,groundTop); g.closePath(); g.fill();
  var grass=g.createLinearGradient(0,groundTop,0,H);
  grass.addColorStop(0,'#a9d089'); grass.addColorStop(1,'#7cb564');
  g.fillStyle=grass; g.fillRect(0,groundTop,W,H-groundTop);
  var wp=new Path2D(); wp.moveTo(0,groundTop);
  for(var i=0;i<shorePts.length;i++) wp.lineTo(shorePts[i].x,shorePts[i].y);
  wp.lineTo(0,H); wp.closePath();
  var water=g.createLinearGradient(0,groundTop,0,H);
  water.addColorStop(0,'#5ba0a8'); water.addColorStop(1,'#8ac6c6');
  g.fillStyle=water; g.fill(wp);
  g.save(); g.clip(wp);
  var wd=g.createLinearGradient(0,groundTop,0,groundTop+(H-groundTop)*0.5);
  wd.addColorStop(0,'rgba(40,90,100,0.25)'); wd.addColorStop(1,'rgba(40,90,100,0)');
  g.fillStyle=wd; g.fillRect(0,groundTop,W,H);
  g.restore();
  g.lineJoin='round'; g.lineCap='round';
  g.beginPath(); g.moveTo(shorePts[0].x,shorePts[0].y);
  for(var j=0;j<shorePts.length;j++) g.lineTo(shorePts[j].x,shorePts[j].y);
  g.lineWidth=13; g.strokeStyle='rgba(233,217,178,0.92)'; g.stroke();
  g.lineWidth=4; g.strokeStyle='rgba(245,233,202,0.95)'; g.stroke();
  drawGrassTexture(g); drawFlowers(g); drawPebbles(g);
}
function drawGrassTexture(g){

    g.beginPath(); g.moveTo(x,y); g.lineTo(x+Math.sin(ang)*len,y-Math.cos(ang)*len); g.stroke();

function drawFlowers(g){

function drawPebbles(g){

function buildPelletSprite(){

function buildVignette(){

function initClouds(){

var DUCK_COUNT=8;

// ---------- spawns ----------
function dropPellet(x,y){
  if(state.pellets.length>=60) state.pellets.shift();
  var inWater=isWater(x,y);
  state.pellets.push({x:x,y:y,z:24*depthScale(y),vz:0,inWater:inWater,claims:0,settled:false,bob:Math.random()*6.283});
  state.lastFeed=state.time; rollSleepDelay();
  spawnTap(x,y); hideHint(); audio.plip(inWater);
}
function eatPellet(pe,duck){
  var idx=state.pellets.indexOf(pe); if(idx<0) return;
  state.pellets.splice(idx,1);
  for(var k=0;k<4;k++) spawnCrumb(pe.x,pe.y-2);
  if(Math.random()<0.28) spawnHeart(duck.x,duck.y-30*depthScale(duck.y));
  if(pe.inWater) spawnRipple(pe.x,pe.y,16);
  audio.nom();
}
function spawnCrumb(x,y){ state.particles.push({type:'crumb',x:x,y:y,vx:rand(-44,44),vy:rand(-60,-26),r:rand(0.9,1.8),t:0,life:rand(0.45,0.8)}); }
function spawnHeart(x,y){ state.particles.push({type:'heart',x:x,y:y,vx:rand(-8,8),vy:-22,s:rand(2.6,3.4),t:0,life:1.1}); }
function spawnTap(x,y){ state.particles.push({type:'ring',x:x,y:y,maxR:22,t:0,life:0.5}); }
function spawnRipple(x,y,maxR){ if(state.ripples.length>60) state.ripples.shift(); state.ripples.push({x:x,y:y,maxR:maxR,r:2,t:0,life:1.1}); }
function spawnZzz(x,y,dir){ state.particles.push({type:'zzz',x:x,y:y,vx:(dir||1)*rand(4,9),vy:rand(-24,-16),s:rand(9,14),t:0,life:rand(1.9,2.6)}); }

// ---------- food assignment ----------
function assignFood(){
  var pellets=state.pellets, minS=Math.min(W,H), i, dk;
  for(i=0;i<pellets.length;i++) pellets[i].claims=0;
  for(var d=0;d<state.ducks.length;d++){
    dk=state.ducks[d];
    if(dk.state==='eat'||dk.state==='happy'||dk.state==='sleep'||dk.state==='toRoost'||dk.state==='wake'||dk.state==='huddle') continue;
    var best=null,bestScore=Infinity,bestDist=0;
    for(i=0;i<pellets.length;i++){
      var pe=pellets[i];
      var dd=Math.hypot(pe.x-dk.x,pe.y-dk.y);
      var score=dd+pe.claims*(0.1*minS);
      if(score<bestScore){ bestScore=score; best=pe; bestDist=dd; }
    }
    if(best && best.claims>=4 && bestDist>0.22*minS) best=null;
    if(best){ best.claims++; dk.targetPellet=best; dk.state='seek'; }
    else { dk.targetPellet=null; if(dk.state==='seek') dk.pickWander(); }
  }
}

// ---------- updates ----------
function updatePellets(dt){
  var grav=560;
  for(var i=0;i<state.pellets.length;i++){
    var pe=state.pellets[i];
    if(!pe.settled){
      pe.vz+=grav*dt; pe.z-=pe.vz*dt;
      if(pe.z<=0){ pe.z=0;
        if(pe.vz>130){ pe.vz=-pe.vz*0.34; }
        else { pe.settled=true; pe.vz=0; if(pe.inWater) spawnRipple(pe.x,pe.y,15); }
      }
    } else if(pe.inWater){ pe.bob+=dt*2.3; }
  }
}
function updateParticles(dt){
  var g=560;
  for(var i=state.particles.length-1;i>=0;i--){
    var p=state.particles[i]; p.t+=dt;
    if(p.type==='crumb'){ p.vy+=g*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }
    else if(p.type==='heart'){ p.y+=p.vy*dt; p.vy+=10*dt; p.x+=p.vx*dt; }
    else if(p.type==='zzz'){ p.y+=p.vy*dt; p.x+=p.vx*dt; }
    if(p.t>=p.life) state.particles.splice(i,1);
  }
}
function updateRipples(dt){
  for(var i=state.ripples.length-1;i>=0;i--){
    var r=state.ripples[i]; r.t+=dt; r.r=2+(r.maxR-2)*(r.t/r.life);
    if(r.t>=r.life) state.ripples.splice(i,1);
  }
}
function updateClouds(dt){
  for(var i=0;i<state.clouds.length;i++){ var c=state.clouds[i]; c.x+=c.sp*dt; if(c.x>W+90) c.x=-90; }
}

function manageSleep(){
  var ducks=state.ducks, i, d;
  if(state.alarm) return; // a visitor has the flock's attention; no napping
  if(state.sleeping){
    // Any fresh food wakes the whole flock.
    if(state.pellets.length>0){
      state.sleeping=false;
      for(i=0;i<ducks.length;i++){ d=ducks[i]; if(d.state==='sleep'||d.state==='toRoost') d.startWake(); }
    }
    return;
  }
  // Don't drift off mid-meal or mid-celebration.
  if(state.pellets.length>0) return;
  if(state.time-state.lastFeed<state.sleepDelay) return;
  for(i=0;i<ducks.length;i++){ var s=ducks[i].state; if(s==='seek'||s==='eat'||s==='happy'||s==='wake') return; }
  // Time to roost: gather around the flock's centre and settle down.
  var cx=0,cy=0,n=ducks.length||1;
  for(i=0;i<ducks.length;i++){ cx+=ducks[i].x; cy+=ducks[i].y; }
  cx=clamp(cx/n,40,W-40); cy=clamp(cy/n,groundTop+40,H-40);
  state.roost={x:cx,y:cy}; state.sleeping=true;
  for(i=0;i<ducks.length;i++){
    d=ducks[i];
    var ang=i*2.399963, rad=20+(i%3)*13; // golden-angle huddle so they don't stack
    d.tx=clamp(cx+Math.cos(ang)*rad,26,W-26);
    d.ty=clamp(cy+Math.sin(ang)*rad,groundTop+26,H-26);
    d.state='toRoost'; d.stateT=0; d.targetPellet=null;
  }
}

// ---------- visitors (random cute guests) ----------
function flockCentroid(){
  var cx=0,cy=0,n=state.ducks.length||1;
  for(var i=0;i<state.ducks.length;i++){ cx+=state.ducks[i].x; cy+=state.ducks[i].y; }
  return {x:cx/n,y:cy/n};
}
function landX(y,pad){ return shoreX(y)+(pad||16); } // keep land animals out of the water
function spookFlock(cat){ // a pounce just landed: send every duck scarpering its own way
  state.scare=1;
  for(var i=0;i<state.ducks.length;i++){
    var d=state.ducks[i], away=Math.atan2(d.y-cat.y,d.x-cat.x);
    d.panicAng=away+rand(-1.0,1.0); d.panicT=rand(0.7,1.4);
  }
}

// Registry of visitor makers. Add new animals here; one is picked at random per visit.
var VISITORS=[ function(){ return new Cat(); } ];

function scheduleNextVisitor(){ state.nextVisitor=state.time+rand(VISITOR_MIN,VISITOR_MAX); }

function manageVisitor(dt){
  if(state.visitor){
    state.visitor.update(dt);
    state.scare=Math.max(0,(state.scare||0)-dt*1.6); // startle fades
    if(state.visitor.spooks){
      // Flock reaction: wake, gather and keep wary of the guest.
      state.sleeping=false; state.alarm=state.visitor;
      var fc=flockCentroid(), v=state.visitor;
      var dx=fc.x-v.x, dy=fc.y-v.y, dd=Math.hypot(dx,dy)||1;
      // Hold a loose huddle in place while he creeps up (push 0 = gather, don't flee);
      // only bolt away when he actually pounces (scare spikes). The per-duck slot radius keeps them spread, not stacked.
      var push=(state.scare||0)*78;
      state.huddle={ x:clamp(fc.x+dx/dd*push,28,W-28), y:clamp(fc.y+dy/dd*push,groundTop+28,H-28) };
      for(var i=0;i<state.ducks.length;i++){
        var dk=state.ducks[i];
        if(dk.state!=='huddle'){ dk.state='huddle'; dk.huddleSlot=i; dk.targetPellet=null; }
      }
    }
    if(state.visitor.done){
      var wasSpook=state.visitor.spooks;
      state.visitor=null; state.alarm=null; state.huddle=null; state.scare=0;
      if(wasSpook){ for(var j=0;j<state.ducks.length;j++) state.ducks[j].pickIdle(); state.lastFeed=state.time; rollSleepDelay(); }
      scheduleNextVisitor();
    }
    return;
  }
  // Spawn timing: wait for the interval, and don't barge in during active feeding.
  if(state.time>=state.nextVisitor && state.pellets.length===0){
    state.visitor=VISITORS[randi(0,VISITORS.length-1)]();
  }
}

// ----- Ginger cat: saunters in, play-stalks the ducks, pounces, wanders off -----
function Cat(){
  this.kind='cat'; this.spooks=true; this.done=false;
  this.y=clamp(groundTop+(H-groundTop)*rand(0.30,0.80),groundTop+50,H-50);
  this.x=W+34; this.facing=-1;             // strolls in from the right (always grass)
  this.vx=0; this.vy=0; this.speed=0; this.walkPhase=0;
  this.state='enter'; this.stateT=0; this.lifeT=0; this.life=rand(20,30);
  this.crouch=0; this.hop=0; this.lunge=0; this.tail=Math.random()*6.283; this.blink=0; this.blinkT=rand(1.5,4);
  this.meowT=rand(1.5,4); this.wakeT=0; this.pounced=false;
  this.tx=clamp(W*rand(0.6,0.85),60,W-30); this.ty=this.y;
}
Cat.prototype.aim=function(toFlock,opts){
  opts=opts||{};
  var t = toFlock? flockCentroid() : {x:this.tx,y:this.ty};
  var ty=clamp(t.y,groundTop+40,H-40);
  var tx=t.x;
  if(!opts.water) tx=Math.max(tx, landX(ty,opts.pad||18)); // entering/leaving: stay on grass
  if(opts.stopAt){ var dx=tx-this.x, dy=ty-this.y, dd=Math.hypot(dx,dy)||1; tx=this.x+dx/dd*Math.max(0,dd-opts.stopAt); ty=this.y+dy/dd*Math.max(0,dd-opts.stopAt); }
  this.tx=clamp(tx,30,W+40); this.ty=ty;
};
Cat.prototype.update=function(dt){
  this.stateT+=dt; this.lifeT+=dt; this.tail+=dt*(this.state==='stalk'?6:3);
  var maxSpeed=0, crouchTarget=0;
  if(this.state==='enter'){ this.aim(false); maxSpeed=64;
    if(Math.hypot(this.tx-this.x,this.ty-this.y)<8){ this.state='stalk'; this.stateT=0; this.pounced=false; }
  } else if(this.state==='stalk'){ this.aim(true,{water:true,stopAt:34}); maxSpeed=24; crouchTarget=0.85;
    if(this.stateT>rand(1.4,2.6)+0.0){ this.state='pounce'; this.stateT=0; this.lunge=0; this.hop=0; }
  } else if(this.state==='pounce'){ this.aim(true,{water:true,stopAt:16}); maxSpeed=170; crouchTarget=0.15;
    this.lunge=Math.min(1,this.stateT*6); this.hop=Math.sin(clamp(this.stateT/0.5,0,1)*Math.PI)*6;
    if(!this.pounced){ var fcp=flockCentroid(); if(Math.hypot(fcp.x-this.x,fcp.y-this.y)<58){ spookFlock(this); this.pounced=true; } } // they scatter as he commits to the pounce
    if(this.stateT>0.5){ this.state='recover'; this.stateT=0; }
  } else if(this.state==='recover'){ maxSpeed=0; crouchTarget=0.1; this.lunge=0;
    if(this.stateT>rand(1.2,2.2)){
      if(this.lifeT>this.life){ this.state='leave'; this.stateT=0; this.tx=W+60; this.ty=clamp(this.y,groundTop+40,H-40); }
      else { this.state='stalk'; this.stateT=0; this.pounced=false; }
    }
  } else if(this.state==='leave'){ this.aim(false); maxSpeed=78;
    if(this.x>W+30) this.done=true;
  }
  // Cats hate water: he'll wade after the ducks but at a crawl, so they can paddle clear.
  var inWater=isWater(this.x,this.y);
  if(inWater) maxSpeed*=0.40;
  // steering (same feel as the ducks)
  var dx=this.tx-this.x, dy=this.ty-this.y, dd=Math.hypot(dx,dy)||1;
  var desVx=0,desVy=0; if(maxSpeed>0&&dd>2){ desVx=dx/dd*maxSpeed; desVy=dy/dd*maxSpeed; }
  var steer=Math.min(1,dt*(this.state==='pounce'?12:6));
  this.vx+=(desVx-this.vx)*steer; this.vy+=(desVy-this.vy)*steer;
  if(inWater){ this.vx*=0.92; this.vy*=0.92; var sp=Math.hypot(this.vx,this.vy); if(sp>80){ this.vx=this.vx/sp*80; this.vy=this.vy/sp*80; } } // wades, but slower than on land
  this.x+=this.vx*dt; this.y+=this.vy*dt;
  this.y=clamp(this.y,groundTop+30,H-20);
  this.speed=Math.hypot(this.vx,this.vy);
  if(Math.abs(this.vx)>5) this.facing=this.vx>0?1:-1;
  this.walkPhase+=dt*(2.5+this.speed*0.06);
  this.crouch+=(crouchTarget-this.crouch)*Math.min(1,dt*5);
  this.inWater=inWater;
  if(inWater&&this.speed>6){ this.wakeT-=dt; if(this.wakeT<=0){ spawnRipple(this.x-this.facing*6*depthScale(this.y),this.y+6,12); this.wakeT=0.3; } }
  this.blink-=dt; this.blinkT-=dt; if(this.blinkT<=0){ this.blink=0.12; this.blinkT=rand(1.8,4.5); }
  this.meowT-=dt; if(this.meowT<=0 && this.state!=='leave'){ audio.meow(); this.meowT=rand(4.5,9.5); }
};

function update(dt){
  manageVisitor(dt);
  manageSleep();
  assignFood();
  for(var i=0;i<state.ducks.length;i++) state.ducks[i].update(dt);
  updatePellets(dt); updateParticles(dt); updateRipples(dt); updateClouds(dt);

  if (weather.loaded && weather.rain) {
    if (Math.random() < dt * 15) { 
      var rx = rand(0, W);
      var ry = rand(groundTop, H);
      if (isWater(rx, ry)) {
        spawnRipple(rx, ry, rand(4, 10)); 
      }
    }
  }
}

// ---------- drawing ----------
function drawClouds(g){
  var puffs=[[0,0,26,16],[20,4,20,12],[-20,5,20,12],[8,-9,17,12],[-8,-7,15,11]];
  for(var i=0;i<state.clouds.length;i++){
    var c=state.clouds[i];
    g.save(); g.translate(c.x,c.y); g.scale(c.sc,c.sc);
    g.fillStyle='rgba(255,255,255,0.55)';
    for(var j=0;j<puffs.length;j++){ var pf=puffs[j]; g.beginPath(); g.ellipse(pf[0],pf[1],pf[2],pf[3],0,0,Math.PI*2); g.fill(); }
    g.fillStyle='rgba(255,255,255,0.4)';
    for(var k=0;k<puffs.length;k++){ var qf=puffs[k]; g.beginPath(); g.ellipse(qf[0],qf[1]-2,qf[2]*0.9,qf[3]*0.9,0,0,Math.PI*2); g.fill(); }
    g.restore();
  }
}
function drawShimmer(g){
  g.save(); g.clip(waterPath);
  var t=state.time, i, x;
  for(i=0;i<5;i++){
    var yy=groundTop+((i+0.6)/5)*(H-groundTop);
    var a=0.04+0.035*(0.5+0.5*Math.sin(t*0.6+i*1.3));
    g.fillStyle='rgba(255,255,255,'+a.toFixed(3)+')';
    var amp=(6+i*1.5)*0.3;
    g.beginPath(); g.moveTo(0,yy);
    for(x=0;x<=W;x+=24) g.lineTo(x,yy+Math.sin(x*0.03+t*0.8+i)*amp);
    g.lineTo(W,yy+10);
    for(x=W;x>=0;x-=24) g.lineTo(x,yy+10+Math.sin(x*0.03+t*0.8+i)*amp);
    g.closePath(); g.fill();
  }
  for(i=0;i<12;i++){
    var gx=((i*97)%100)/100*W, gy=groundTop+(((i*53)%100)/100)*(H-groundTop);
    if(gx<shoreX(gy)-4){
      var tw=0.5+0.5*Math.sin(t*2+i*2.1);
      g.fillStyle='rgba(255,255,255,'+(0.10*tw).toFixed(3)+')';
      g.beginPath(); g.ellipse(gx,gy,2.2,1.0,0,0,Math.PI*2); g.fill();
    }
  }
  g.restore();
}
function drawRipples(g){
  if(!state.ripples.length) return;
  g.save(); g.clip(waterPath);
  for(var i=0;i<state.ripples.length;i++){
    var r=state.ripples[i], a=clamp(1-r.t/r.life,0,1);
    g.strokeStyle='rgba(255,255,255,'+(0.35*a).toFixed(3)+')'; g.lineWidth=1.3;
    g.beginPath(); g.ellipse(r.x,r.y,r.r,r.r*0.42,0,0,Math.PI*2); g.stroke();
    g.strokeStyle='rgba(120,170,168,'+(0.25*a).toFixed(3)+')'; g.lineWidth=1;
    g.beginPath(); g.ellipse(r.x,r.y,r.r*0.6,r.r*0.25,0,0,Math.PI*2); g.stroke();
  }
  g.restore();
}
function drawScene(g){
  var items=[],i;
  for(i=0;i<state.ducks.length;i++) items.push({y:state.ducks[i].y,k:0,o:state.ducks[i]});
  for(i=0;i<state.pellets.length;i++) items.push({y:state.pellets[i].y,k:1,o:state.pellets[i]});
  for(i=0;i<state.lilies.length;i++) items.push({y:state.lilies[i].y,k:2,o:state.lilies[i]});
  for(i=0;i<state.reeds.length;i++) items.push({y:state.reeds[i].y,k:3,o:state.reeds[i]});
  if(state.visitor) items.push({y:state.visitor.y,k:4,o:state.visitor});
  items.sort(function(a,b){return a.y-b.y;});
  for(i=0;i<items.length;i++){
    var it=items[i];
    if(it.k===0) it.o.draw(g);
    else if(it.k===1) drawPellet(g,it.o);
    else if(it.k===2) drawLily(g,it.o);
    else if(it.k===3) drawReed(g,it.o);
    else if(it.k===4) drawVisitor(g,it.o);
  }
}
function drawPellet(g,pe){
  var ds=depthScale(pe.y), rv=3.6*ds;
  var bobY=(pe.settled&&pe.inWater)?Math.sin(pe.bob)*1.1:0;
  var px=pe.x, py=pe.y-pe.z+bobY;
  var land=clamp(1-pe.z/(24*ds),0.1,1);
  g.fillStyle='rgba(45,50,45,'+(0.18*land).toFixed(3)+')';
  g.beginPath(); g.ellipse(pe.x,pe.y,rv*1.25*land+1,rv*0.55*land+0.6,0,0,Math.PI*2); g.fill();
  if(pe.settled&&pe.inWater){ g.fillStyle='rgba(255,255,255,0.16)'; g.beginPath(); g.ellipse(px,pe.y+0.5,rv*1.5,rv*0.7,0,0,Math.PI*2); g.fill(); }
  var dsz=rv*2.5; g.drawImage(pelletSprite,px-dsz/2,py-dsz/2,dsz,dsz);
}
function drawLily(g,li){
  var bobY=Math.sin(state.time*1.1+li.phase)*1.2, x=li.x, y=li.y+bobY, r=li.r;
  g.fillStyle='rgba(20,60,60,0.12)'; g.beginPath(); g.ellipse(x,y+2,r,r*0.5,0,0,Math.PI*2); g.fill();
  g.fillStyle='#56a055'; g.beginPath(); g.ellipse(x,y,r,r*0.52,0,0,Math.PI*2); g.fill();
  g.fillStyle='#74b3b6'; g.beginPath(); g.moveTo(x,y); g.lineTo(x+r*0.96,y-r*0.16); g.lineTo(x+r*0.96,y+r*0.16); g.closePath(); g.fill();
  g.strokeStyle='rgba(255,255,255,0.16)'; g.lineWidth=1;
  g.beginPath(); g.moveTo(x,y); g.lineTo(x-r*0.6,y-r*0.18); g.moveTo(x,y); g.lineTo(x-r*0.62,y); g.moveTo(x,y); g.lineTo(x-r*0.6,y+r*0.18); g.stroke();
  if(li.flower) drawLilyFlower(g,x-r*0.1,y-2,r*0.42);
}
function drawLilyFlower(g,x,y,r){
  var k,a;
  g.fillStyle='#f3a8c4';
  for(k=0;k<6;k++){ a=k/6*Math.PI*2; g.beginPath(); g.ellipse(x+Math.cos(a)*r*0.7,y+Math.sin(a)*r*0.5,r*0.5,r*0.3,a,0,Math.PI*2); g.fill(); }
  g.fillStyle='#ffd9e8';
  for(k=0;k<5;k++){ a=k/5*Math.PI*2+0.3; g.beginPath(); g.ellipse(x+Math.cos(a)*r*0.4,y+Math.sin(a)*r*0.28,r*0.34,r*0.22,a,0,Math.PI*2); g.fill(); }
  g.fillStyle='#f6cf4b'; g.beginPath(); g.ellipse(x,y,r*0.28,r*0.2,0,0,Math.PI*2); g.fill();
}
function drawReed(g,rd){
  var sway=Math.sin(state.time*0.8+rd.phase)*(3+rd.h*0.05)+rd.lean*8;
  var bx=rd.x,by=rd.y,tx=rd.x+sway,ty=rd.y-rd.h, mx=(bx+tx)/2-sway*0.25, my=(by+ty)/2;
  g.strokeStyle='#5f923c'; g.lineWidth=2.3; g.lineCap='round';
  g.beginPath(); g.moveTo(bx,by); g.quadraticCurveTo(mx,my,tx,ty); g.stroke();
  g.strokeStyle='#79ab50'; g.lineWidth=1;
  g.beginPath(); g.moveTo(bx,by); g.quadraticCurveTo(mx,my,tx,ty); g.stroke();
  g.fillStyle='#5f923c'; g.save(); g.translate(mx,my); g.rotate(-0.6+rd.lean);
  g.beginPath(); g.ellipse(0,0,rd.h*0.28,2.2,0,0,Math.PI*2); g.fill(); g.restore();
  if(rd.hasCattail){
    g.fillStyle='#7a4a28'; g.beginPath(); g.ellipse(tx,ty+rd.h*0.14,2.6,rd.h*0.15,0,0,Math.PI*2); g.fill();
    g.strokeStyle='#5f923c'; g.lineWidth=1; g.beginPath(); g.moveTo(tx,ty); g.lineTo(tx+sway*0.08,ty-rd.h*0.14); g.stroke();
  }
}
function drawVisitor(g,v){ if(v.kind==='cat') drawCat(g,v); }
function catLeg(g,hipX,hipY,phase,amt,color,w){
  var footX=hipX+Math.sin(phase)*5*amt;
  var footY=-Math.max(0,Math.sin(phase+Math.PI/2))*4*amt;
  var kneeX=(hipX+footX)/2+1.5, kneeY=(hipY+footY)/2;
  g.strokeStyle=color; g.lineWidth=w; g.lineCap='round';
  g.beginPath(); g.moveTo(hipX,hipY); g.quadraticCurveTo(kneeX,kneeY,footX,footY); g.stroke();
  g.fillStyle=color; g.beginPath(); g.ellipse(footX,footY-0.4,2.5,1.5,0,0,Math.PI*2); g.fill();
}
function drawCat(g,cat){
  var ds=depthScale(cat.y), s=ds*1.04, wet=!!cat.inWater;
  var P={fur:'#e8913f',dark:'#c9762a',cream:'#f7e6cf',stripe:'#b9661c',ear:'#eda07f',earIn:'#e89f83',nose:'#d56a72',eye:'#4a8a3c'};
  g.save();
  g.translate(cat.x,cat.y);
  g.fillStyle='rgba(45,55,45,'+(wet?0.06:0.16)+')';
  g.beginPath(); g.ellipse(0,0,23*s,5*s,0,0,Math.PI*2); g.fill();
  g.scale(cat.facing,1);
  g.translate(0,-(cat.hop||0)*s);
  g.scale(s,s);

  var cr=cat.crouch||0, lunge=cat.lunge||0, amt=clamp(cat.speed/120,0.12,1);
  var bodyY=-16+cr*3.5;
  var rearX=-15, rearY=bodyY-1-cr*1.2;
  var shoulderX=12, shoulderY=bodyY+1+cr*3;
  var headX=23+lunge*8, headY=-25+cr*9+lunge*3;
  var ph=cat.walkPhase;

  // far legs (behind body) — slightly darker
  catLeg(g,rearX+2,rearY+8,ph+Math.PI*0.5,amt,P.dark,4.2);
  catLeg(g,shoulderX-1,shoulderY+7,ph+Math.PI*1.5,amt,P.dark,4.2);

  // tail (behind), with a swish and darker tip
  var sw=Math.sin(cat.tail)*7;
  g.strokeStyle=P.fur; g.lineWidth=6.4; g.lineCap='round';
  var t0x=rearX-5,t0y=rearY-1, t1x=rearX-19,t1y=rearY-8+sw*0.5, t2x=rearX-22+sw*0.5,t2y=rearY-22+sw;
  g.beginPath(); g.moveTo(t0x,t0y); g.quadraticCurveTo(t1x,t1y,t2x,t2y); g.stroke();
  g.strokeStyle=P.stripe; g.lineWidth=5.4; g.lineCap='round';
  g.beginPath(); g.moveTo(lerp(t1x,t2x,0.55),lerp(t1y,t2y,0.55)); g.quadraticCurveTo(t2x,t2y,t2x,t2y); g.stroke();

  // --- BODY ---
  g.fillStyle=P.fur;
  g.beginPath(); g.ellipse(rearX,rearY,11.5,10.5,0.1,0,Math.PI*2); g.fill();   // haunch
  g.beginPath(); g.ellipse(-1,bodyY,19,8.6,0,0,Math.PI*2); g.fill();           // barrel
  g.beginPath(); g.ellipse(shoulderX,shoulderY-1,9.2,8.2,0,0,Math.PI*2); g.fill(); // chest
  g.fillStyle=P.cream;
  g.beginPath(); g.ellipse(2,bodyY+5.2,14,4.4,0,0,Math.PI*2); g.fill();        // belly
  // tabby back stripes
  g.strokeStyle=P.stripe; g.lineWidth=1.8; g.lineCap='round';
  for(var i=0;i<4;i++){ var bx=-8+i*7; g.beginPath(); g.moveTo(bx,bodyY-8.2); g.quadraticCurveTo(bx-2,bodyY-3,bx-1,bodyY-1); g.stroke(); }

  // near legs (in front of body)
  catLeg(g,rearX+3,rearY+8,ph+Math.PI,amt,P.fur,4.6);
  catLeg(g,shoulderX,shoulderY+7,ph,amt,P.fur,4.8);

  // --- NECK + HEAD ---
  g.fillStyle=P.fur;
  g.beginPath(); g.moveTo(shoulderX-2,shoulderY-6);
  g.quadraticCurveTo(headX-6,headY+6,headX-2,headY+5);
  g.lineTo(headX+3,headY+7); g.quadraticCurveTo(shoulderX+5,shoulderY-1,shoulderX+4,shoulderY-7); g.closePath(); g.fill();

  // ears (flatten back when stalking/pouncing)
  var earBack=clamp(cr,0,1);
  function ear(sign){
    g.save(); g.translate(headX+sign*4.4,headY-5.6); g.rotate(sign*(0.15+earBack*0.5));
    g.fillStyle=P.fur; g.beginPath(); g.moveTo(-3.4,2); g.lineTo(sign*0.6,-7.2-(1-earBack)*1.5); g.lineTo(3.4,2); g.closePath(); g.fill();
    g.fillStyle=P.earIn; g.beginPath(); g.moveTo(-1.7,1.2); g.lineTo(sign*0.4,-4.4); g.lineTo(1.9,1.2); g.closePath(); g.fill();
    g.restore();
  }
  ear(-1); ear(1);
  // head
  g.fillStyle=P.fur; g.beginPath(); g.ellipse(headX,headY,8.2,7.4,0,0,Math.PI*2); g.fill();
  // muzzle
  g.fillStyle=P.cream; g.beginPath(); g.ellipse(headX+4.5,headY+3.2,4.2,3.2,0,0,Math.PI*2); g.fill();
  // forehead stripes
  g.strokeStyle=P.stripe; g.lineWidth=1.3;
  g.beginPath(); g.moveTo(headX-1.5,headY-7); g.lineTo(headX-1,headY-3); g.moveTo(headX-4,headY-6.2); g.lineTo(headX-3,headY-3); g.moveTo(headX+1.5,headY-6.6); g.lineTo(headX+1.4,headY-3); g.stroke();
  // nose + mouth
  g.fillStyle=P.nose; g.beginPath(); g.moveTo(headX+7.4,headY+1.6); g.lineTo(headX+8.8,headY+1.6); g.lineTo(headX+8.1,headY+2.8); g.closePath(); g.fill();
  g.strokeStyle=P.dark; g.lineWidth=0.8; g.beginPath(); g.moveTo(headX+8.1,headY+2.8); g.lineTo(headX+8.1,headY+4); g.moveTo(headX+8.1,headY+4); g.quadraticCurveTo(headX+6.5,headY+4.6,headX+5.6,headY+3.8); g.stroke();
  // eye (almond; a slit when stalking; line when blinking)
  var ex=headX+2.2, ey=headY-0.6;
  if(cat.blink>0){ g.strokeStyle=P.dark; g.lineWidth=1; g.beginPath(); g.moveTo(ex-2,ey); g.quadraticCurveTo(ex,ey+1,ex+2,ey); g.stroke(); }
  else {
    g.fillStyle=P.eye; g.beginPath(); g.ellipse(ex,ey,2.5,cr>0.5?1.5:2.6,0,0,Math.PI*2); g.fill();
    g.fillStyle='#1c1c14'; g.beginPath(); g.ellipse(ex+0.4,ey,cr>0.5?0.7:1.1,cr>0.5?1.4:1.8,0,0,Math.PI*2); g.fill();
    g.fillStyle='rgba(255,255,255,0.85)'; g.beginPath(); g.ellipse(ex-0.5,ey-0.9,0.6,0.7,0,0,Math.PI*2); g.fill();
  }
  // whiskers
  g.strokeStyle='rgba(255,255,255,0.7)'; g.lineWidth=0.6;
  g.beginPath();
  g.moveTo(headX+5.5,headY+2.2); g.lineTo(headX+13,headY+0.6);
  g.moveTo(headX+5.5,headY+3); g.lineTo(headX+13,headY+3.4);
  g.moveTo(headX+5.5,headY+3.6); g.lineTo(headX+12.5,headY+6); g.stroke();

  if(wet){ // waterline across the lower body while he wades
    g.fillStyle='rgba(95,162,168,0.55)'; g.beginPath(); g.ellipse(-1,bodyY+9,21,5.2,0,0,Math.PI*2); g.fill();
    g.fillStyle='rgba(255,255,255,0.20)'; g.beginPath(); g.ellipse(-1,bodyY+7.6,20,1.9,0,0,Math.PI*2); g.fill();
  }
  g.restore();
}
function drawHeart(g,x,y,s,a){
  g.save(); g.globalAlpha=a; g.fillStyle='#ef8aa0';
  g.beginPath(); g.moveTo(x,y+s*0.3);
  g.bezierCurveTo(x,y,x-s,y,x-s,y+s*0.35);
  g.bezierCurveTo(x-s,y+s*0.8,x,y+s*1.1,x,y+s*1.3);
  g.bezierCurveTo(x,y+s*1.1,x+s,y+s*0.8,x+s,y+s*0.35);
  g.bezierCurveTo(x+s,y,x,y,x,y+s*0.3);
  g.fill(); g.restore();
}
function drawParticles(g){
  for(var i=0;i<state.particles.length;i++){
    var p=state.particles[i], kk=p.t/p.life;
    if(p.type==='crumb'){
      g.globalAlpha=clamp(1-kk,0,1); g.fillStyle='#8a5f31';
      g.beginPath(); g.ellipse(p.x,p.y,p.r,p.r,0,0,Math.PI*2); g.fill();
    } else if(p.type==='heart'){
      var pop=Math.min(1,p.t/0.18), sc=lerp(0.3,1,pop)*p.s;
      drawHeart(g,p.x,p.y,sc,clamp(1-kk,0,1)*0.9);
    } else if(p.type==='ring'){
      var rr=2+(p.maxR-2)*kk;
      g.globalAlpha=clamp(1-kk,0,1)*0.5; g.strokeStyle='rgba(255,255,255,0.9)'; g.lineWidth=1.4;
      g.beginPath(); g.ellipse(p.x,p.y,rr,rr*0.5,0,0,Math.PI*2); g.stroke();
    } else if(p.type==='zzz'){
      var za=clamp(1-kk,0,1)*0.85, zsz=p.s*(0.7+0.3*Math.min(1,p.t/0.3));
      g.globalAlpha=za; g.fillStyle='#f3f6ff'; g.textAlign='center'; g.textBaseline='middle';
      g.font='italic '+zsz.toFixed(1)+'px Georgia, "Times New Roman", serif';
      g.fillText('z',p.x+Math.sin(p.t*3)*3,p.y);
    }
  }
  g.globalAlpha=1;
}

// ----- Weather specific drawing logic -----
function drawStarsAndMoon(g){
  // Twinkling Stars
  g.fillStyle = 'rgba(255, 255, 255, 0.9)';
  for(var i=0; i<stars.length; i++){
    var sx = stars[i].x * W;
    var sy = stars[i].y * (groundTop - 5); // Keep them above the water line
    var r = 0.6 + stars[i].s * 1.2;
    g.globalAlpha = 0.4 + 0.6 * Math.abs(Math.sin(state.time * 1.5 + i));
    g.beginPath(); g.arc(sx, sy, r, 0, Math.PI*2); g.fill();
  }
  g.globalAlpha = 1.0;

  // The Moon (Top Right)
  var moonX = W * 0.8;
  var moonY = groundTop * 0.4;
  g.fillStyle = '#fffdf0';
  g.beginPath(); g.arc(moonX, moonY, 16, 0, Math.PI*2); g.fill();
  g.fillStyle = 'rgba(255, 255, 255, 0.08)';
  g.beginPath(); g.arc(moonX, moonY, 26, 0, Math.PI*2); g.fill();
  g.beginPath(); g.arc(moonX, moonY, 40, 0, Math.PI*2); g.fill();
}

function drawRain(g){
  if(weather.rain){
    g.strokeStyle = 'rgba(255, 255, 255, 0.25)';
    g.lineWidth = 1;
    g.beginPath();
    for(var i=0; i<60; i++){
      var x = rand(0, W+50), y = rand(0, H);
      g.moveTo(x, y); g.lineTo(x-3, y+9);
    }
    g.stroke();
  }
}

function drawVignette(g){ g.fillStyle=vignetteGrad; g.fillRect(0,0,W,H); }

function render(){
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(bg,0,0,W,H); // Base pre-rendered scene

  // 1. Draw a very dark wash over the bright background if it is night
  if (weather.loaded && weather.isDay === 0) {
     ctx.fillStyle = 'rgba(4, 10, 24, 0.78)';
     ctx.fillRect(0,0,W,H);
     drawStarsAndMoon(ctx); // Draw celestial bodies behind the ducks
  }

  // 2. Draw standard scene elements
  drawClouds(ctx);
  drawShimmer(ctx);
  drawRipples(ctx);
  drawScene(ctx); // This renders the ducks and the food
  drawParticles(ctx);

  // 3. Draw a final lighter wash and weather effects so the ducks blend into the night
  if (weather.loaded) {
     if (weather.isDay === 0) {
        ctx.fillStyle = 'rgba(4, 10, 24, 0.35)'; // Gentle tint to darken the ducks
        ctx.fillRect(0,0,W,H);
     }
     drawRain(ctx);
  }
  
  drawVignette(ctx);
}

// ---------- audio (optional, gentle) ----------
var audio=(function(){
  var actx=null,master=null,padGain=null,noiseSrc=null,noiseGain=null,chirpTimer=null;
  var enabled=false,started=false;
  function ensure(){
    if(actx) return;
    var AC=window.AudioContext||window.webkitAudioContext;
    if(!AC) return;
    try{ actx=new AC(); master=actx.createGain(); master.gain.value=0.0; master.connect(actx.destination); }catch(e){ actx=null; }
    // iOS: ask for the 'playback' session so sound isn't muted by the ring/silent switch
    try{ if(navigator.audioSession) navigator.audioSession.type='playback'; }catch(e){}
  }
  function startAmbient(){
    if(!actx||started) return; started=true;
    try{
      var len=Math.floor(3*actx.sampleRate), buf=actx.createBuffer(1,len,actx.sampleRate), d=buf.getChannelData(0), i;
      for(i=0;i<len;i++) d[i]=Math.random()*2-1;
      var wind=actx.createBufferSource(); wind.buffer=buf; wind.loop=true;
      var wbp=actx.createBiquadFilter(); wbp.type='bandpass'; wbp.frequency.value=700; wbp.Q.value=0.6;
      var windGain=actx.createGain(); windGain.gain.value=0.03;
      wind.connect(wbp); wbp.connect(windGain); windGain.connect(master); wind.start();
      var gust=actx.createOscillator(); gust.type='sine'; gust.frequency.value=0.06;
      var gustG=actx.createGain(); gustG.gain.value=0.035; gust.connect(gustG); gustG.connect(windGain.gain); gust.start();
      var sweep=actx.createOscillator(); sweep.type='sine'; sweep.frequency.value=0.033;
      var sweepG=actx.createGain(); sweepG.gain.value=350; sweep.connect(sweepG); sweepG.connect(wbp.frequency); sweep.start();
      var shim=actx.createBufferSource(); shim.buffer=buf; shim.loop=true;
      var shp=actx.createBiquadFilter(); shp.type='highpass'; shp.frequency.value=3200;
      var slp=actx.createBiquadFilter(); slp.type='lowpass'; slp.frequency.value=7500;
      var shimGain=actx.createGain(); shimGain.gain.value=0.01;
      shim.connect(shp); shp.connect(slp); slp.connect(shimGain); shimGain.connect(master); shim.start();
      var sl=actx.createOscillator(); sl.type='sine'; sl.frequency.value=0.11;
      var slG=actx.createGain(); slG.gain.value=0.008; sl.connect(slG); slG.connect(shimGain.gain); sl.start();
    }catch(e){}
  }
  function birdNote(t,f0,f1,dur,peak,pan){
    var o=actx.createOscillator(); o.type='sine';
    var g=actx.createGain();
    o.frequency.setValueAtTime(f0,t);
    o.frequency.exponentialRampToValueAtTime(f1,t+dur*0.4);
    o.frequency.exponentialRampToValueAtTime(Math.max(200,f1*0.9),t+dur);
    var vib=actx.createOscillator(); vib.type='sine'; vib.frequency.value=20+Math.random()*14;
    var vibG=actx.createGain(); vibG.gain.value=f0*0.02; vib.connect(vibG); vibG.connect(o.frequency); vib.start(t); vib.stop(t+dur+0.03);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(peak,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);
    if(actx.createStereoPanner){ var pn=actx.createStereoPanner(); pn.pan.value=pan; g.connect(pn); pn.connect(master); }
    else g.connect(master);
    o.start(t); o.stop(t+dur+0.03);
  }
  function bird(){
    if(!actx||!enabled) return;
    try{
      var t=actx.currentTime+0.03, pan=(Math.random()*2-1)*0.6;
      var base=1950+Math.random()*1300, peak=0.04+Math.random()*0.02, type=Math.floor(Math.random()*4), k;
      if(type===0){ 
        birdNote(t, base*0.8, base*1.25, 0.18+Math.random()*0.08, peak, pan);
      } else if(type===1){ 
        birdNote(t, base*0.9, base, 0.12, peak, pan);
        birdNote(t+0.17, base*1.16, base*1.34, 0.16, peak, pan);
      } else if(type===2){
        var n=4+Math.floor(Math.random()*3), gap=0.075+Math.random()*0.03;
        for(k=0;k<n;k++) birdNote(t+k*gap, base*1.05, base*1.18, 0.06, peak*0.9, pan);
      } else { 
        for(k=0;k<3;k++) birdNote(t+k*0.16, base*(1.12-k*0.12), base*(1.02-k*0.12), 0.12, peak, pan);
      }
    }catch(e){}
  }
  function scheduleBird(){
    if(!enabled) return;
    chirpTimer=setTimeout(function(){
      if(enabled){
        bird();
        if(Math.random()<0.25) setTimeout(function(){ if(enabled) bird(); }, 600+Math.random()*900);
        scheduleBird();
      }
    }, 1500+Math.random()*9000);
  }
  function plip(water){
    if(!actx||!enabled) return;
    try{
      var t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
      o.type='sine'; o.connect(g); g.connect(master);
      var f0=water?520:680, f1=water?180:260;
      o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(f1,t+0.12);
      g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(water?0.12:0.10,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
      o.start(t); o.stop(t+0.2);
      if(water){
        var o2=actx.createOscillator(), g2=actx.createGain(); o2.type='sine';
        o2.frequency.setValueAtTime(300,t); o2.frequency.exponentialRampToValueAtTime(140,t+0.15);
        g2.gain.setValueAtTime(0.0001,t); g2.gain.linearRampToValueAtTime(0.06,t+0.02); g2.gain.exponentialRampToValueAtTime(0.0001,t+0.2);
        o2.connect(g2); g2.connect(master); o2.start(t); o2.stop(t+0.22);
      }
    }catch(e){}
  }
  function nom(){
    if(!actx||!enabled) return;
    try{
      var t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain(); o.type='triangle';
      o.frequency.setValueAtTime(420,t); o.frequency.exponentialRampToValueAtTime(260,t+0.08);
      g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.07,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.12);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+0.14);
    }catch(e){}
  }
  function happy(){
    if(!actx||!enabled) return;
    try{
      var t=actx.currentTime, notes=[620,820], i;
      for(i=0;i<notes.length;i++){
        var off=i*0.11, o=actx.createOscillator(), g=actx.createGain(); o.type='triangle';
        o.frequency.setValueAtTime(notes[i],t+off); o.frequency.exponentialRampToValueAtTime(notes[i]*1.16,t+off+0.09);
        g.gain.setValueAtTime(0.0001,t+off); g.gain.linearRampToValueAtTime(0.055,t+off+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+off+0.18);
        o.connect(g); g.connect(master); o.start(t+off); o.stop(t+off+0.2);
      }
    }catch(e){}
  }
  function meow(){
    if(!actx||!enabled) return;
    try{
      var t=actx.currentTime;
      var o=actx.createOscillator(), bp=actx.createBiquadFilter(), g=actx.createGain();
      o.type='sawtooth';
      // pitch contour: a little rise then a fall — "me-ow"
      o.frequency.setValueAtTime(560,t);
      o.frequency.linearRampToValueAtTime(770,t+0.16);
      o.frequency.linearRampToValueAtTime(470,t+0.5);
      // vibrato for a plaintive wobble
      var vib=actx.createOscillator(), vibG=actx.createGain();
      vib.frequency.value=13; vibG.gain.value=16;
      vib.connect(vibG); vibG.connect(o.frequency); vib.start(t); vib.stop(t+0.62);
      // vowel formant sweep (ee -> ow)
      bp.type='bandpass'; bp.Q.value=4.5;
      bp.frequency.setValueAtTime(1500,t); bp.frequency.linearRampToValueAtTime(850,t+0.5);
      o.connect(bp); bp.connect(g); g.connect(master);
      g.gain.setValueAtTime(0.0001,t);
      g.gain.linearRampToValueAtTime(0.085,t+0.07);
      g.gain.setValueAtTime(0.08,t+0.24);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.6);
      o.start(t); o.stop(t+0.62);
    }catch(e){}
  }
  function setEnabled(on){
    ensure(); if(!actx) return false;
    enabled=on;
    try{
      if(on){
        if(actx.state==='suspended') actx.resume();
        try{ var ub=actx.createBuffer(1,1,22050), us=actx.createBufferSource(); us.buffer=ub; us.connect(actx.destination); us.start(0); }catch(e){}
        try{ if(navigator.audioSession) navigator.audioSession.type='playback'; }catch(e){}
        startAmbient();
        master.gain.cancelScheduledValues(actx.currentTime);
        master.gain.linearRampToValueAtTime(0.5,actx.currentTime+0.6);
        scheduleBird();
      } else {
        master.gain.cancelScheduledValues(actx.currentTime);
        master.gain.linearRampToValueAtTime(0.0,actx.currentTime+0.4);
        if(chirpTimer){ clearTimeout(chirpTimer); chirpTimer=null; }
      }
    }catch(e){}
    return true;
  }
  return { toggle:function(){ return setEnabled(!enabled); }, isOn:function(){ return enabled; }, plip:plip, nom:nom, happy:happy, meow:meow };
})();

// ---------- ui ----------
function hideHint(){ if(!hinted){ hinted=true; hintEl.classList.add('hide'); } }
function updateSndIcon(){
  var on=audio.isOn();
  sndBtn.innerHTML = on
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>';
}
sndBtn.addEventListener('click',function(e){ e.stopPropagation(); audio.toggle(); updateSndIcon(); sndBtn.classList.toggle('on',audio.isOn()); });

// ---------- input ----------
var pressing=false,lastDropX=0,lastDropY=0,lastDropT=0;
function evPos(e){ var r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
function doDrop(x,y){
  var cy=clamp(y,groundTop+6,H-6), cx=clamp(x,6,W-6);
  dropPellet(cx,cy); lastDropX=cx; lastDropY=cy; lastDropT=performance.now();
}
canvas.addEventListener('pointerdown',function(e){
  pressing=true; try{canvas.setPointerCapture(e.pointerId);}catch(err){}
  var p=evPos(e); doDrop(p.x,p.y);
});
canvas.addEventListener('pointermove',function(e){
  if(!pressing) return;
  var p=evPos(e), now=performance.now();
  if(now-lastDropT>90 && Math.hypot(p.x-lastDropX,p.y-lastDropY)>22) doDrop(p.x,p.y);
});
canvas.addEventListener('pointerup',function(){ pressing=false; });
canvas.addEventListener('pointercancel',function(){ pressing=false; });
canvas.addEventListener('contextmenu',function(e){ e.preventDefault(); });

// ---------- loop ----------
function frame(now){
  if(!running) return;
  var dt=Math.min(0.045,(now-last)/1000||0); last=now;
  state.time+=dt;
  update(dt); render();
  requestAnimationFrame(frame);
}

// ---------- resize / init ----------
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=Math.max(1,window.innerWidth); H=Math.max(1,window.innerHeight);
  canvas.width=Math.floor(W*DPR); canvas.height=Math.floor(H*DPR);
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  buildScene();
  buildVignette();
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',function(){ setTimeout(resize,200); });
document.addEventListener('visibilitychange',function(){
  if(document.hidden){ running=false; }
  else if(!running){ running=true; last=performance.now(); requestAnimationFrame(frame); }
});

resize();
updateSndIcon();
syncWeather();
rollSleepDelay();
scheduleNextVisitor();
last=performance.now();
requestAnimationFrame(frame);
requestAnimationFrame(function(){ canvas.classList.add('show'); });

})();
