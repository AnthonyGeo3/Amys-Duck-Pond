<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Little Duck Pond</title>
<meta name="theme-color" content="#bfe0dc">
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Duck Pond">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Firebase (compat build = global `firebase`). Loaded before the app so the shared pond can sync;
     if these fail (offline), the app falls back to per-device localStorage. -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent; /* Fixes the blue flashing on tap */
  }
  html,body{height:100%;overflow:hidden;background:#bfe0dc;}
  body{
    font-family:'Quicksand',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    -webkit-font-smoothing:antialiased;
    user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
    touch-action:none;overscroll-behavior:none;
  }
  #scene{
    display:block;position:fixed;inset:0;width:100vw;height:100vh;
    touch-action:none;cursor:pointer;opacity:0;transition:opacity .9s ease;
  }
  #scene.show{opacity:1;}
  #ui{position:fixed;inset:0;pointer-events:none;z-index:10;}
  #title{
    position:absolute;top:calc(env(safe-area-inset-top,0px) + 16px);left:18px;
    color:rgba(38,80,76,.5);font-size:13px;font-weight:700;letter-spacing:.5px;
  }
  #coin{
    position:absolute;top:calc(env(safe-area-inset-top,0px) + 38px);left:16px;
    display:flex;align-items:center;gap:7px;
    background:rgba(255,255,255,.58);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    box-shadow:0 4px 14px rgba(40,70,65,.16);border-radius:999px;padding:5px 12px 5px 7px;
    color:#2c5450;font-weight:700;font-size:14px;pointer-events:none;
  }
  #coin .ic{
    width:18px;height:18px;border-radius:50%;flex:0 0 auto;
    background:radial-gradient(circle at 35% 32%, #ffe79a, #f3c33e 62%, #d9962a 100%);
    box-shadow:inset 0 0 0 1.5px rgba(180,130,30,.45);
  }
  #coin .lbl{font-weight:500;font-size:11px;color:rgba(44,84,80,.62);letter-spacing:.3px;}
  #snd{
    position:absolute;top:calc(env(safe-area-inset-top,0px) + 12px);right:14px;
    width:42px;height:42px;border-radius:50%;border:none;
    background:rgba(255,255,255,.58);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    box-shadow:0 4px 14px rgba(40,70,65,.18);
    pointer-events:auto;cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:#2c5450;transition:transform .15s ease,background .2s ease;
  }
  #snd:active{transform:scale(.92);}
  #snd.on{background:rgba(255,255,255,.82);}
  #snd svg{width:21px;height:21px;}
  #shop{
    position:absolute;top:calc(env(safe-area-inset-top,0px) + 62px);right:14px;
    width:42px;height:42px;border-radius:50%;border:none;
    background:rgba(255,255,255,.58);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    box-shadow:0 4px 14px rgba(40,70,65,.18);
    pointer-events:auto;cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:#2c5450;transition:transform .15s ease,background .2s ease;
  }
  #shop:active{transform:scale(.92);}
  #shop svg{width:22px;height:22px;}
  #roster{
    position:absolute;top:calc(env(safe-area-inset-top,0px) + 112px);right:14px;
    width:42px;height:42px;border-radius:50%;border:none;
    background:rgba(255,255,255,.58);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    box-shadow:0 4px 14px rgba(40,70,65,.18);
    pointer-events:auto;cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:#2c5450;transition:transform .15s ease,background .2s ease;
  }
  #roster:active{transform:scale(.92);}
  #roster svg{width:24px;height:24px;}
  #rosterList{flex:1 1 auto;min-height:0;overflow-y:auto;max-height:60vh;display:flex;flex-direction:column;gap:10px;margin-top:10px;padding:2px 5px 2px 1px;-webkit-overflow-scrolling:touch;}
  #rosterList::-webkit-scrollbar{width:6px;} #rosterList::-webkit-scrollbar-thumb{background:rgba(91,160,168,.5);border-radius:999px;}
  .rosterRow{display:flex;align-items:center;gap:11px;background:rgba(143,200,198,.16);border:1px solid rgba(143,200,198,.4);border-radius:14px;padding:8px 10px;}
  .rosterRow canvas{width:46px;height:54px;flex:none;}
  .rosterRow .info{flex:1 1 auto;min-width:0;text-align:left;}
  .rosterRow .rn{color:#2c5450;font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rosterRow .rn.unnamed{color:rgba(44,84,80,.45);font-style:italic;font-weight:500;}
  .rosterRow .rsub{color:rgba(44,84,80,.6);font-size:11px;margin-top:1px;}
  .rosterRow button{flex:none;border:none;border-radius:999px;padding:7px 12px;font-family:inherit;font-weight:700;font-size:12px;background:#5ba0a8;color:#fff;cursor:pointer;}
  .rosterRow button:active{transform:scale(.95);background:#4d8c93;}
  #shopModal, #rosterModal{
    position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(30,55,52,.34);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
    pointer-events:auto;z-index:20;padding:20px;
  }
  #shopModal.open, #rosterModal.open{display:flex;}
  #shopCard{
    background:rgba(255,255,255,.94);border-radius:22px;padding:20px 20px 14px;
    width:min(88vw,340px);box-shadow:0 16px 44px rgba(40,70,65,.32);text-align:center;
    max-height:90vh;display:flex;flex-direction:column;
  }
  #shopCard h2{color:#2c5450;font-size:18px;font-weight:700;}
  #shopCard p.sub{color:rgba(44,84,80,.6);font-size:12.5px;font-weight:500;margin:3px 0 14px;}
  #shopList{display:flex;flex-direction:column;gap:10px;}
  .shopItem{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:rgba(143,200,198,.18);border:1px solid rgba(143,200,198,.42);
    border-radius:14px;padding:9px 10px 9px 14px;
  }
  .shopItem .nm{color:#2c5450;font-weight:600;font-size:15px;}
  .shopItem .sub2{color:rgba(44,84,80,.55);font-size:11px;font-weight:500;margin-top:1px;}
  .shopItem button{
    border:none;border-radius:999px;padding:8px 14px;font-family:inherit;font-weight:700;font-size:13px;white-space:nowrap;
    background:#5ba0a8;color:#fff;cursor:pointer;transition:transform .12s ease,background .2s ease;
  }
  .shopItem button:active{transform:scale(.94);background:#4d8c93;}
  .shopItem button:disabled{background:rgba(120,140,140,.28);color:rgba(44,84,80,.5);cursor:default;}
  .shopBal{display:flex;align-items:center;justify-content:center;gap:6px;color:#2c5450;font-weight:700;font-size:15px;margin-bottom:12px;}
  .shopBal .ic{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 35% 32%, #ffe79a, #f3c33e 62%, #d9962a 100%);box-shadow:inset 0 0 0 1.3px rgba(180,130,30,.45);}
  .shopHd{color:rgba(44,84,80,.6);font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;text-align:left;margin:6px 2px 1px;}
  #shopVisitors{
    flex:1 1 auto;min-height:0;overflow-y:auto;max-height:336px;
    display:flex;flex-direction:column;gap:10px;margin-top:8px;padding:2px 5px 2px 1px;
    -webkit-overflow-scrolling:touch;
  }
  #shopVisitors::-webkit-scrollbar{width:6px;}
  #shopVisitors::-webkit-scrollbar-thumb{background:rgba(91,160,168,.5);border-radius:999px;}
  #shopVisitors::-webkit-scrollbar-track{background:transparent;}
  #shopClose{
    margin-top:13px;border:none;background:none;color:rgba(44,84,80,.6);
    font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;padding:6px;
  }
  #duckModal{
    position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(30,55,52,.34);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
    pointer-events:auto;z-index:21;padding:20px;
  }
  #duckModal.open{display:flex;}
  #duckCard{
    background:rgba(255,255,255,.96);border-radius:22px;padding:20px;
    width:min(86vw,300px);box-shadow:0 16px 44px rgba(40,70,65,.32);text-align:center;
  }
  #duckTitle{display:flex;align-items:center;justify-content:center;gap:8px;color:#2c5450;font-size:18px;font-weight:700;}
  #duckSwatch{width:16px;height:16px;border-radius:50%;box-shadow:inset 0 0 0 1.5px rgba(60,70,60,.25);}
  #duckCard p.sub{color:rgba(44,84,80,.6);font-size:12.5px;font-weight:500;margin:4px 0 14px;}
  #duckName{
    width:100%;box-sizing:border-box;border:1.5px solid rgba(143,200,198,.55);border-radius:12px;
    padding:11px 13px;font-family:inherit;font-size:15px;color:#2c5450;text-align:center;outline:none;background:rgba(143,200,198,.10);
  }
  #duckName:focus{border-color:#5ba0a8;}
  #duckBtns{display:flex;gap:10px;margin-top:14px;}
  #duckSave{flex:1;border:none;border-radius:999px;padding:10px;font-family:inherit;font-weight:700;font-size:14px;background:#5ba0a8;color:#fff;cursor:pointer;}
  #duckSave:active{transform:scale(.97);background:#4d8c93;}
  #duckCloseBtn{border:none;background:none;color:rgba(44,84,80,.6);font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;padding:6px 12px;}
  #hint{
    position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 22px);
    transform:translateX(-50%);
    background:rgba(255,255,255,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    color:#2c5450;padding:10px 18px;border-radius:999px;
    font-size:14px;font-weight:500;letter-spacing:.2px;
    box-shadow:0 6px 20px rgba(40,70,65,.18);white-space:nowrap;
    transition:opacity .7s ease,transform .7s ease;
  }
  #hint span{display:inline-block;animation:floaty 3.4s ease-in-out infinite;}
  #hint.hide{opacity:0;transform:translateX(-50%) translateY(10px);}
  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
  @media (prefers-reduced-motion:reduce){
    #scene{transition:none;} #hint span{animation:none;}
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="ui">
    <div id="title">little duck pond</div>
    <div id="coin"><span class="ic"></span><span id="coinVal">0</span><span class="lbl">Quacks</span></div>
    <button id="snd" aria-label="Enable gentle sounds"></button>
    <button id="shop" aria-label="Open the shop">
      <svg viewBox="0 0 24 24">
        <rect x="4.6" y="6.6" width="1.5" height="9.4" fill="#a9743f"/>
        <rect x="17.9" y="6.6" width="1.5" height="9.4" fill="#a9743f"/>
        <rect x="3.4" y="15.3" width="17.2" height="4.7" rx="0.7" fill="#ecd29a"/>
        <rect x="3.4" y="15.3" width="17.2" height="1.5" rx="0.7" fill="#d3b27a"/>
        <circle cx="12" cy="12.5" r="2.5" fill="#f7d83a" stroke="#e0b81f" stroke-width="0.5"/>
        <rect x="2.4" y="3.4" width="19.2" height="3.3" fill="#e2674a"/>
        <rect x="6" y="3.4" width="3" height="3.3" fill="#fbf1dd"/>
        <rect x="12" y="3.4" width="3" height="3.3" fill="#fbf1dd"/>
        <rect x="18" y="3.4" width="3" height="3.3" fill="#fbf1dd"/>
        <path d="M2.4 6.7l1.6 1.7 1.6-1.7 1.6 1.7 1.6-1.7 1.6 1.7 1.6-1.7 1.6 1.7 1.6-1.7 1.6 1.7 1.6-1.7 1.6 1.7 1.6-1.7" fill="#e2674a"/>
      </svg>
    </button>
    <button id="roster" aria-label="Open the flock roster">
      <svg viewBox="0 0 24 24">
        <path d="M14.5 12.5 q5 -0.6 7.2 1.3 q-1.4 2.2 -7.2 1.4 z" fill="#f0a02e"/>
        <circle cx="9.5" cy="10.5" r="6.6" fill="#f3d36b"/>
        <circle cx="11" cy="8.6" r="1.5" fill="#2c2018"/>
        <circle cx="11.5" cy="8.1" r="0.5" fill="#fff"/>
      </svg>
    </button>
    <div id="shopModal">
      <div id="shopCard">
        <h2>Pond shop</h2>
        <p class="sub">Spend your Quacks</p>
        <div id="shopList"></div>
        <div id="shopVisitors"></div>
        <button id="shopClose">Close</button>
      </div>
    </div>
    <div id="duckModal">
      <div id="duckCard">
        <div id="duckTitle"><span id="duckSwatch"></span><span id="duckBreed">Duck</span></div>
        <p id="duckAge" class="sub">hatched just now</p>
        <input id="duckName" type="text" maxlength="18" placeholder="Name this duck" autocomplete="off" />
        <div id="duckBtns">
          <button id="duckSave">Save</button>
          <button id="duckCloseBtn">Close</button>
        </div>
      </div>
    </div>
    <div id="rosterModal">
      <div id="shopCard">
        <h2>Your flock</h2>
        <p class="sub" id="rosterSub">All your ducks</p>
        <div id="rosterList"></div>
        <button id="rosterClose">Close</button>
      </div>
    </div>
    <div id="hint"><span>Tap to feed · hold a duck to name it</span></div>
  </div>

<script>
(function(){
'use strict';

// ---------- core refs ----------
var canvas=document.getElementById('scene');
var ctx=canvas.getContext('2d');
var hintEl=document.getElementById('hint');
var sndBtn=document.getElementById('snd');
var shopBtn=document.getElementById('shop');
var shopModal=document.getElementById('shopModal');
var shopList=document.getElementById('shopList');
var shopVisitors=document.getElementById('shopVisitors');
var shopClose=document.getElementById('shopClose');
var duckModal=document.getElementById('duckModal');
var duckCard=document.getElementById('duckCard');
var duckNameInput=document.getElementById('duckName');
var rosterBtn=document.getElementById('roster');
var rosterModal=document.getElementById('rosterModal');
var rosterList=document.getElementById('rosterList');
var coinVal=document.getElementById('coinVal');
var coinLbl=document.querySelector('#coin .lbl');
var _coinShown=-1;
function updateCoinUI(){ var v=Math.floor(state.currency); if(v!==_coinShown){ _coinShown=v; coinVal.textContent=v.toLocaleString(); } }

var W=0,H=0,DPR=1,groundTop=0;
var bg=null,bgctx=null,pelletSprite=null,vignetteGrad=null,waterPath=null;
var pelletSpriteSize=28;
var shorePts=[];
var ducksInit=false,running=true,last=0,hinted=false;

var shoreSeed={base:0,amp:0,freq:2,phase:Math.random()*6.283,slope:0};
var state={ducks:[],pellets:[],particles:[],ripples:[],clouds:[],lilies:[],reeds:[],time:0,lastFeed:0,sleeping:false,roost:null,
  visitor:null,nextVisitor:0,alarm:null,huddle:null,scare:0,sleepDelay:90,chased:null,friend:null,dfChaser:null,dfTarget:null,frogChaser:null,frogTarget:null,
  currency:0,duckCount:1,unlocked:{}};

// ---------- currency ("Quacks") ----------
var CURRENCY='Quacks';          // rename here to taste
var EARN_PER_PELLET=1;          // +1 each time a normal duck eats a pellet
var GOLD_EARN_PER_PELLET=10;    // a golden duck's pellets are worth 10x
var EARN_PER_MINUTE=100;        // passive earnings while the app is open
var SAVE_KEY='duckpond_save_v1';
var BABY_MS=24*60*60*1000;      // a newly bought duck stays a duckling for 24h, then grows up
var _births=[];                 // shared per-duck birth timestamps (index-aligned with the flock; 0 = grown)
var _colors=[];                 // shared per-duck palette index (index-aligned; rolled at purchase)
var _names=[];                  // shared per-duck names (index-aligned; '' = unnamed)
var _eaten=[];                  // shared per-duck pellets eaten (committed totals)
var _eatenPending=[];           // local unsaved increments, folded into _eaten on save (atomic delta, like currency)
function _eatenTotal(i){ return (_eaten[i]||0)+(_eatenPending[i]||0); }

// Shared pond via Firebase Realtime Database. One record at ponds/shared that both phones subscribe to.
// Earnings/spends are committed as atomic transactions so the two clients can't clobber each other.
// localStorage is kept as an instant + offline fallback; if Firebase can't load, the app still works per-device.
var FIREBASE_CONFIG={
  apiKey:"AIzaSyDPN_5r1k8LquBbZU3BOaPL6vgO_KNphSI",
  authDomain:"amys-duck-pond.firebaseapp.com",
  databaseURL:"https://amys-duck-pond-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"amys-duck-pond",
  storageBucket:"amys-duck-pond.firebasestorage.app",
  messagingSenderId:"532496506242",
  appId:"1:532496506242:web:c0ecf84d1a6adc7e03839b"
};
var POND_PATH='ponds/shared';
var VISITOR_COST=1500;          // base price of the 1st visitor; +500 for each one already owned
function ownedCount(u){ var n=0; u=u||{}; for(var k in u){ if(u[k]) n++; } return n; }
function visitorCostFor(u){ return VISITOR_COST + 500*ownedCount(u); }   // 1st 1500, 2nd 2000, 3rd 2500...
function visitorCost(){ return visitorCostFor(state.unlocked); }
function duckCost(){ return 500*state.duckCount; }   // 1st extra duck 500, then +500 each
var _pondRef=null, _pendingEarn=0, _remoteReady=false;
function addCurrency(n){ state.currency+=n; if(_pondRef) _pendingEarn+=n; }   // accrue locally; commit the delta on save
function applyPond(p){           // mirror the shared record into local state + the world
  p=p||{};
  state.currency=(typeof p.currency==='number'?p.currency:0)+_pendingEarn;
  var nducks=typeof p.ducks==='number'?p.ducks:1;
  _births=normBirths(p.births, nducks);
  _colors=normColors(p.colors, nducks);
  _names=normNames(p.names, nducks);
  _eaten=normEaten(p.eaten, nducks);
  setDuckCount(nducks);
  syncDuckAges();
  state.unlocked=p.unlocked||{};
  if(typeof refreshShopUI==='function') refreshShopUI();
}
function normBirths(b,n){ var out=[]; b=b||[]; for(var i=0;i<n;i++) out[i]=(typeof b[i]==='number')?b[i]:0; return out; }  // dense, length n, 0 = grown
function normColors(c,n){ var out=[]; c=c||[]; for(var i=0;i<n;i++) out[i]=(typeof c[i]==='number'&&c[i]>=0&&c[i]<PALS.length)?c[i]:defaultDuckPal(i); return out; }   // dense; legacy ducks get a stable realistic colour
function normNames(a,n){ var out=[]; a=a||[]; for(var i=0;i<n;i++) out[i]=(typeof a[i]==='string')?a[i].slice(0,18):''; return out; }   // dense; '' = unnamed
function normEaten(a,n){ var out=[]; a=a||[]; for(var i=0;i<n;i++) out[i]=(typeof a[i]==='number'&&a[i]>=0)?Math.round(a[i]):0; return out; }   // dense; 0 = never fed
function _eatenList(n){ var out=[]; for(var i=0;i<n;i++) out[i]=_eatenTotal(i); return out; }
function syncDuckAges(){ for(var i=0;i<state.ducks.length;i++){ var d=state.ducks[i]; d.bornAt=_births[i]||0; d.colIdx=(typeof _colors[i]==='number')?_colors[i]:defaultDuckPal(i); d.pal=PALS[d.colIdx]; d.golden=isGoldenPal(d.colIdx); d.name=_names[i]||''; d.eaten=_eatenTotal(i); } }  // keep live ducks in step with the shared lists
function _localPond(){ return { currency:Math.round(state.currency-_pendingEarn), ducks:state.duckCount, unlocked:state.unlocked||{}, births:normBirths(_births,state.duckCount), colors:normColors(_colors,state.duckCount), names:normNames(_names,state.duckCount), eaten:_eatenList(state.duckCount) }; }
var store={
  load:function(){
    try{ var s=JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');
      if(typeof s.pendingEarn==='number') _pendingEarn=s.pendingEarn;
      if(typeof s.currency==='number') state.currency=s.currency;
      if(typeof s.ducks==='number'){ _births=normBirths(s.births, s.ducks); _colors=normColors(s.colors, s.ducks); _names=normNames(s.names, s.ducks); _eaten=normEaten(s.eaten, s.ducks); setDuckCount(s.ducks); syncDuckAges(); }
      if(s.unlocked) state.unlocked=s.unlocked;
    }catch(e){}
    this._connect();
  },
  _connect:function(){
    if(_pondRef || !window.firebase || !FIREBASE_CONFIG.databaseURL) return;   // offline / SDK missing => stay on localStorage
    try{
      if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      firebase.auth().signInAnonymously().then(function(){
        var ref=firebase.database().ref(POND_PATH); _pondRef=ref;
        ref.on('value', function(snap){
          var p=snap.val();
          if(p){ _remoteReady=true; applyPond(p); }                                          // shared record is the truth
          else { ref.transaction(function(c){ return c==null?_localPond():c; }, function(){ _remoteReady=true; }); }  // first run: seed it
        });
      }).catch(function(){ /* auth blocked => stay local */ });
    }catch(e){ _pondRef=null; }
  },
  save:function(){
    if(_pondRef && _remoteReady){
      var d=Math.round(_pendingEarn);

      var hub=state.huddle||{x:this.x,y:this.y}, sc=state.scare||0;
      var ha=this.huddleSlot*2.399963, hr=(15+(this.huddleSlot%3)*9)*(1+sc*1.0);
      tx=clamp(hub.x+Math.cos(ha)*hr,22,W-22); ty=clamp(hub.y+Math.sin(ha)*hr,groundTop+22,H-22);
      var d2h=Math.hypot(tx-this.x,ty-this.y);
      maxSpeed=clamp(d2h*1.6, WALK*1.3, RUN*0.85);
    }
  }
  else { tx=this.x; ty=this.y; maxSpeed=0; }

  var dx=tx-this.x, dy=ty-this.y, dd=Math.hypot(dx,dy)||1;
  var desVx=0,desVy=0;
  if(maxSpeed>0&&dd>2){ desVx=dx/dd*maxSpeed; desVy=dy/dd*maxSpeed; }
  var steer=Math.min(1,dt*7);
  this.vx+=(desVx-this.vx)*steer; this.vy+=(desVy-this.vy)*steer;
  this.x+=this.vx*dt; this.y+=this.vy*dt;

  if(this.state!=='ride'&&this.state!=='onCapy'){   // a duck perched on an animal's back shouldn't be clamped to the ground bounds
    var m=18;
    if(this.x<m){this.x=m;this.vx*=-0.3;} if(this.x>W-m){this.x=W-m;this.vx*=-0.3;}
    if(this.y<groundTop+m){this.y=groundTop+m;this.vy*=-0.3;} if(this.y>H-m){this.y=H-m;this.vy*=-0.3;}
  }

  this.speed=Math.hypot(this.vx,this.vy);
  if(Math.abs(this.vx)>6) this.facing=this.vx>0?1:-1;
  this.legAmt=Math.min(1.1,this.speed/70);
  if(this.state==='onCapy'){ this.pattering=true; this.legAmt=1.0; this.walkPhase+=dt*15; this.hop=Math.abs(Math.sin(this.walkPhase))*1.2; }   // happy fed-style pitter-patter feet

  this.walkPhase+=dt*(3+this.speed*0.10);
  this.bobPhase+=dt*(this.swimming?1.6:(4+this.speed*0.10));

  var leanTarget=this.swimming?Math.sin(state.time*1.2+this.seed)*0.025:(0.05+Math.min(1,this.speed/RUN)*0.16);
  this.leanCur+=(leanTarget-this.leanCur)*Math.min(1,dt*6);
  this.bobCur=Math.sin(this.bobPhase)*(this.swimming?2.0:(0.8+this.legAmt*1.4));

  // sleepiness: ramps up while roosting/sleeping, eases back when awake
  var drowsyTarget=this.state==='sleep'?1:(this.state==='toRoost'?0.3:0);
  var drowsyRate=drowsyTarget>this.drowsy?1.4:4.5; // drift off slowly, wake up briskly
  this.drowsy+=(drowsyTarget-this.drowsy)*Math.min(1,dt*drowsyRate);
  if(this.state==='sleep'){
    this.bobCur+=Math.sin(state.time*1.5+this.seed)*this.drowsy*0.8; // gentle breathing
    if(this.drowsy>0.6){
      this.zzzT-=dt;
      if(this.zzzT<=0){ spawnZzz(this.x+this.facing*5,this.y-34*depthScale(this.y),this.facing); this.zzzT=2.2+Math.random()*2.4; }
    }
  }

  // celebration drivers
  if(this.state==='happy'){
    this.happyT+=dt;
    if(this.swimming){
      this.pattering=false;
      this.wingFlap=Math.sin(this.happyT*15)*0.5;
      this.hop=0;
      this.bobCur+=Math.sin(this.happyT*7.5)*1.6;
      this.happyRip-=dt;
      if(this.happyRip<=0){ spawnRipple(this.x+rand(-4,4),this.y+rand(-2,2),12); this.happyRip=0.22; }
    } else {
      this.pattering=true;
      this.legAmt=0.95;
      this.walkPhase+=dt*19;
      this.wingFlap=Math.sin(this.happyT*20)*0.38;
      this.hop=Math.abs(Math.sin(this.happyT*11))*2.4;
    }
  } else if(this.state==='wake'){
    this.pattering=false;
    this.wingFlap=Math.sin(this.stateT*22)*0.4; // a sleepy stretch of the wings
    this.hop+=(0-this.hop)*Math.min(1,dt*9);
  } else if(this.state==='flee'){
    this.pattering=false;
    this.wingFlap=Math.sin(this.walkPhase*3+this.seed)*0.42; // flapping for dear life
    this.hop=Math.abs(Math.sin(this.walkPhase*2.6))*2.0;
  } else if(this.state==='frogShy'){
    this.pattering=false;
    this.wingFlap=Math.sin(this.walkPhase*3+this.seed)*0.34; // a startled little flutter
    this.hop=Math.abs(Math.sin(this.walkPhase*2.6))*1.4;
  } else if(this.state==='huddle'){
    this.pattering=false;
    var fl=Math.max(state.scare||0, this.panicT>0?0.95:0);
    if(fl>0.25){ this.wingFlap=Math.sin(this.walkPhase*3+this.seed)*0.34*fl; this.hop=Math.abs(Math.sin(this.walkPhase*2.5))*fl*1.8; }
    else { this.wingFlap+=(0-this.wingFlap)*Math.min(1,dt*9); this.hop+=(0-this.hop)*Math.min(1,dt*9); }
  } else {
    this.pattering=false;
    this.wingFlap+=(0-this.wingFlap)*Math.min(1,dt*9);
    this.hop+=(0-this.hop)*Math.min(1,dt*9);
  }

  if(this.state==='peck'){ var pr=clamp(this.stateT/this.stateDur,0,1); this.headDip=Math.sin(pr*Math.PI); }
  else if(this.state==='eat'){ var pe=clamp(this.stateT/this.stateDur,0,1); this.headDip=Math.sin(pe*Math.PI)*0.95; }
  else if(this.state==='mimic'){
    // once settled in the line, dip the head to the water like the stork
    if(this.mimicPeckPhase>0){ this.mimicPeckPhase+=dt; var mp=clamp(this.mimicPeckPhase/0.6,0,1); this.headDip=Math.sin(mp*Math.PI);
      if(mp>0.46&&mp<0.56) spawnRipple(shoreX(this.y)-6,this.y,8);
      if(mp>=1) this.mimicPeckPhase=0; }
    else { this.headDip+=(0-this.headDip)*Math.min(1,dt*8); this.mimicPeckT-=dt;
      if(this.mimicPeckT<=0 && this.speed<14){ this.mimicPeckPhase=0.0001; this.mimicPeckT=rand(1.4,2.8); } }
  }
  else this.headDip+=(0-this.headDip)*Math.min(1,dt*8);

  this.blink-=dt; this.blinkTimer-=dt;
  if(this.blinkTimer<=0){ this.blink=0.12; this.blinkTimer=2.5+Math.random()*5; }
  if(this.golden){ this.sparkT-=dt; if(this.sparkT<=0){ var gd=depthScale(this.y); spawnSparkle(this.x+rand(-9,9), this.y-30*gd+rand(-6,6)); this.sparkT=rand(0.7,1.7); } }   // golden ducks twinkle

  if(this.swimming&&this.speed>8){ this.wakeT-=dt; if(this.wakeT<=0){ spawnRipple(this.x-this.facing*5*depthScale(this.y),this.y,10); this.wakeT=0.35; } }

  if(this.state==='seek'){
    if(!this.targetPellet){ this.pickWander(); }
    else {
      var pd=Math.hypot(this.targetPellet.x-this.x,this.targetPellet.y-this.y);
      var eatDist=13*depthScale(this.y);
      if(state.pellets.indexOf(this.targetPellet)>=0 && pd<eatDist && this.targetPellet.z<6){
        eatPellet(this.targetPellet,this); this.targetPellet=null; this.state='eat'; this.stateT=0; this.stateDur=0.45;
      }
    }
  } else if(this.state==='eat'){ if(this.stateT>=this.stateDur) this.startHappy(); }
  else if(this.state==='happy'){ if(this.stateT>=this.stateDur){ this.pattering=false; this.pickIdle(); } }
  else if(this.state==='wander'){ var rd=Math.hypot(this.tx-this.x,this.ty-this.y); if(rd<6||this.stateT>=this.stateDur) this.pickIdle(); }
  else if(this.state==='pause'||this.state==='peck'){ if(this.stateT>=this.stateDur) this.pickIdle(); }
  else if(this.state==='toRoost'){ var rr=Math.hypot(this.tx-this.x,this.ty-this.y); if(rr<7||this.stateT>=12){ this.state='sleep'; this.stateT=0; } }
  else if(this.state==='wake'){ if(this.stateT>=this.stateDur) this.pickIdle(); }
};
Duck.prototype.draw=function(g){
  var baby=1-(this.adultness===undefined?1:this.adultness);   // 0 = grown, 1 = newborn duckling
  var ds=depthScale(this.y), s=this.size*ds*(1-0.44*baby), p=this.pal, swim=this.swimming;
  var PR=this.prop||{wing:1,beak:1,foot:1,head:1,tall:1};   // per-duck component size jitter
  g.save();
  g.translate(this.x,this.y);

  if(!swim){
    g.fillStyle='rgba(45,55,45,0.16)';
    g.beginPath(); g.ellipse(0,0,11.5*s,4*s,0,0,Math.PI*2); g.fill();
  }

  g.scale(this.facing,1);
  g.rotate(this.leanCur);
  g.scale(s,s);
  if(PR.tall&&PR.tall!==1) g.scale(1,PR.tall);   // stretch height a touch, feet stay planted at the origin

  var bodyRx=9.2,bodyRy=21.5,headR=7.8*(1+0.30*baby)*PR.head;   // ducklings: big round head...
  var bodyCenterY=swim?-15:-26;
  var bodyTopY=bodyCenterY-bodyRy+5;
  var headBaseX=1.8, headBaseY=bodyTopY-19*(1-0.34*baby);  // ...on a short little neck
  var dip=this.headDip;
  var hx=headBaseX+dip*7;
  var hy=headBaseY+dip*(swim?36:21);
  if(this.state==='happy'){ hy+=Math.sin(this.happyT*16)*0.9; hx+=Math.sin(this.happyT*16+1)*0.6; }
  if(this.drowsy>0.01){ hx-=this.drowsy*9; hy+=this.drowsy*16; } // sink the head back & down: bill tucked toward the wing
  var bob=this.bobCur;
  var self=this;

  function ribbon(x0,y0,cx,cy,x1,y1,w0,w1){
    var N=12,L=[],R=[],i,t,mt,px,py,dx2,dy2,len,nx,ny,w;
    for(i=0;i<=N;i++){
      t=i/N; mt=1-t;
      px=mt*mt*x0+2*mt*t*cx+t*t*x1;
      py=mt*mt*y0+2*mt*t*cy+t*t*y1;
      dx2=2*mt*(cx-x0)+2*t*(x1-cx);
      dy2=2*mt*(cy-y0)+2*t*(y1-cy);
      len=Math.hypot(dx2,dy2)||1; nx=-dy2/len; ny=dx2/len; w=(w0+(w1-w0)*t)*0.5;
      L.push([px+nx*w,py+ny*w]); R.push([px-nx*w,py-ny*w]);
    }
    g.beginPath(); g.moveTo(L[0][0],L[0][1]);
    for(i=1;i<L.length;i++) g.lineTo(L[i][0],L[i][1]);
    for(i=R.length-1;i>=0;i--) g.lineTo(R[i][0],R[i][1]);
    g.closePath();
  }

  function drawBody(){
    var topY=bodyCenterY-bodyRy+3, botY=bodyCenterY+bodyRy, wMax=bodyRx, topHalf=3.6;
    g.fillStyle=p.wing;
    var txb=-wMax*0.5, tyb=botY-3;
    g.beginPath(); g.moveTo(txb,tyb);
    g.quadraticCurveTo(txb-6,tyb-4,txb-7.5,tyb-10.5);
    g.quadraticCurveTo(txb-1.5,tyb-7,txb+3,tyb-3.5); g.closePath(); g.fill();
    var nbx=1.2, nby=topY+4, ncx=lerp(nbx,hx,0.5)+1.6, ncy=lerp(nby,hy,0.5);
    g.fillStyle=p.body; ribbon(nbx,nby,ncx,ncy,hx,hy+headR*0.5,headR*1.45,headR*0.92); g.fill();
    g.fillStyle=p.body;
    g.beginPath();
    g.moveTo(-topHalf,topY);
    g.bezierCurveTo(-wMax*0.92,topY+bodyRy*0.30,-wMax,botY-bodyRy*0.55,-wMax*0.6,botY-2);
    g.quadraticCurveTo(-wMax*0.16,botY+2.6,wMax*0.12,botY+2.3);
    g.quadraticCurveTo(wMax*0.52,botY+1.4,wMax*0.8,botY-3);
    g.bezierCurveTo(wMax*1.06,botY-bodyRy*0.5,wMax*0.72,topY+bodyRy*0.28,topHalf+1.4,topY);
    g.quadraticCurveTo(0,topY-2.6,-topHalf,topY);
    g.closePath(); g.fill();
    g.strokeStyle='rgba(70,55,40,0.10)'; g.lineWidth=1; g.stroke();
    g.fillStyle=p.belly; g.beginPath(); g.ellipse(wMax*0.34,bodyCenterY+5,wMax*0.62,bodyRy*0.66,0.05,0,Math.PI*2); g.fill();
    if(p.neckRing){
      var rt=0.58, rx=nbx+(hx-nbx)*rt, ry=nby+(hy-nby)*rt, ang=Math.atan2(hy-nby,hx-nbx);
      g.save(); g.translate(rx,ry); g.rotate(ang); g.fillStyle=p.neckRing;
      g.beginPath(); g.ellipse(0,0,headR*0.5,headR*0.85,0,0,Math.PI*2); g.fill(); g.restore();
    }
    g.save(); g.translate(-1.2,bodyCenterY+4); g.rotate(-0.16-self.wingFlap*0.7); g.translate(0,-Math.abs(self.wingFlap)*1.5);
    g.fillStyle=p.wing; g.beginPath(); g.ellipse(0,0,wMax*0.7*PR.wing,bodyRy*0.5*PR.wing,0,0,Math.PI*2); g.fill();
    g.strokeStyle='rgba(0,0,0,0.06)'; g.lineWidth=0.8;
    for(var i=-1;i<=1;i++){ g.beginPath(); g.moveTo(-3,i*3+2); g.lineTo(5,i*3+5); g.stroke(); }
    g.restore();
    g.fillStyle=p.head; g.beginPath(); g.ellipse(hx,hy,headR,headR*0.97,0,0,Math.PI*2); g.fill();
    g.fillStyle=p.blush; g.beginPath(); g.ellipse(hx+headR*0.4,hy+headR*0.3,2.1,1.4,0,0,Math.PI*2); g.fill();
    var bkx=hx+headR*0.62, bky=hy-0.6, bl=PR.beak;   // beak length jitter
    g.fillStyle=p.beak; g.beginPath();
    g.moveTo(bkx-1.2,bky-2.9); g.quadraticCurveTo(bkx+8.4*bl,bky-3.1,bkx+10.0*bl,bky-0.6);
    g.quadraticCurveTo(bkx+9.0*bl,bky+2.6,bkx-1.2,bky+3.0); g.quadraticCurveTo(bkx+1.4,bky,bkx-1.2,bky-2.9); g.closePath(); g.fill();
    g.strokeStyle=p.beakDark; g.lineWidth=0.8; g.beginPath(); g.moveTo(bkx-0.6,bky+0.2); g.quadraticCurveTo(bkx+6*bl,bky-0.1,bkx+9.0*bl,bky-0.5); g.stroke();
    g.fillStyle=p.beakDark; g.beginPath(); g.ellipse(bkx+2.4,bky-1.4,0.6,0.5,0,0,Math.PI*2); g.fill();
    var ex=hx+headR*0.28, ey=hy-headR*0.24;
    if(self.blink>0||self.drowsy>0.5){
      g.strokeStyle=p.eye; g.lineWidth=1.1; g.lineCap='round';
      g.beginPath(); g.moveTo(ex-2,ey); g.quadraticCurveTo(ex,ey+1.4,ex+2,ey); g.stroke();
    } else {
      var er=1+0.22*baby;   // bigger, rounder baby eyes
      g.fillStyle=p.eye; g.beginPath(); g.ellipse(ex,ey,2.3*er,2.5*er,0,0,Math.PI*2); g.fill();
      g.fillStyle='rgba(255,255,255,0.92)'; g.beginPath(); g.ellipse(ex-0.7*er,ey-0.9*er,0.85*er,0.95*er,0,0,Math.PI*2); g.fill();
    }
  }

  function drawLegs(){
    var pat=self.pattering;
    var stride=(pat?1.9:4.6)*self.legAmt, lift=(pat?4.4:3.4)*self.legAmt, ph=self.walkPhase;
    var hipY=bodyCenterY+bodyRy-4;
    function oneLeg(baseX,phase,color,w){
      var footX=baseX+stride*Math.sin(phase);
      var footLift=Math.max(0,Math.sin(phase+Math.PI/2))*lift;
      var footY=-footLift, hipX=baseX*0.4;
      g.strokeStyle=color; g.lineWidth=w; g.lineCap='round';
      g.beginPath(); g.moveTo(hipX,hipY); g.lineTo(footX,footY); g.stroke();
      g.fillStyle=color; g.beginPath(); g.ellipse(footX+1.4,footY,3.4*PR.foot,1.6*PR.foot,0,0,Math.PI*2); g.fill();
    }
    oneLeg(-1.7,ph+Math.PI,p.legDark,2.8);
    oneLeg(2.4,ph,p.legs,3.1);
  }

  if(swim){
    g.save();
    g.beginPath(); g.rect(-44,-150,88,150); g.clip();
    g.save(); g.translate(0,-bob); drawBody(); g.restore();
    g.restore();
    g.fillStyle='rgba(255,255,255,0.22)'; g.beginPath(); g.ellipse(0,0,bodyRx*1.5,2.6,0,0,Math.PI*2); g.fill();
    g.fillStyle='rgba(30,70,75,0.12)'; g.beginPath(); g.ellipse(0,1.4,bodyRx*1.3,1.7,0,0,Math.PI*2); g.fill();
  } else {
    drawLegs();
    g.save(); g.translate(0,-bob-this.hop); drawBody(); g.restore();
  }
  g.restore();
};

// ---------- scene building ----------
function computeLayout(){
  groundTop=Math.round(H*0.16);
  shoreSeed.base=W*0.5;
  shoreSeed.amp=Math.min(W*0.06,48);
  shoreSeed.freq=2.0;
  shoreSeed.slope=W*0.06;
}
function buildScene(){
  computeLayout();
  shorePts=[]; for(var y=groundTop;y<=H;y+=6){ shorePts.push({x:shoreX(y),y:y}); }
  waterPath=new Path2D(); waterPath.moveTo(0,groundTop);
  for(var i=0;i<shorePts.length;i++) waterPath.lineTo(shorePts[i].x,shorePts[i].y);
  waterPath.lineTo(0,H); waterPath.closePath();

  bg=document.createElement('canvas'); bg.width=Math.max(1,Math.floor(W*DPR)); bg.height=Math.max(1,Math.floor(H*DPR));
  bgctx=bg.getContext('2d'); bgctx.setTransform(DPR,0,0,DPR,0,0);
  renderStatic(bgctx);
  buildPelletSprite(); buildVignette();
  initClouds(); initLilies(); initReeds();
  if(!state.fireflies) initFireflies();   // keep these across resizes so they don't snap-reset
  if(!state.seasonP) initSeason();

  if(!ducksInit){ initDucks(); ducksInit=true; }
  else { for(var k=0;k<state.ducks.length;k++){ var d=state.ducks[k]; d.x=clamp(d.x,26,W-26); d.y=clamp(d.y,groundTop+26,H-26); } }
}
function renderStatic(g){
  var sky=g.createLinearGradient(0,0,0,groundTop);
  sky.addColorStop(0,'#cfeae6'); sky.addColorStop(1,'#ecf5ed');
  g.fillStyle=sky; g.fillRect(0,0,W,groundTop);
  var sun=g.createRadialGradient(W*0.7,groundTop*0.4,2,W*0.7,groundTop*0.4,groundTop*1.6);
  sun.addColorStop(0,'rgba(255,250,230,0.5)'); sun.addColorStop(1,'rgba(255,250,230,0)');
  g.fillStyle=sun; g.fillRect(0,0,W,groundTop+30);
  g.fillStyle='#cfe2bf'; g.beginPath(); g.moveTo(0,groundTop);
  g.quadraticCurveTo(W*0.2,groundTop-16,W*0.45,groundTop-5);
  g.quadraticCurveTo(W*0.7,groundTop+5,W,groundTop-12); g.lineTo(W,groundTop); g.closePath(); g.fill();
  var grass=g.createLinearGradient(0,groundTop,0,H);
  grass.addColorStop(0,'#a9d089'); grass.addColorStop(1,'#7cb564');
  g.fillStyle=grass; g.fillRect(0,groundTop,W,H-groundTop);
  var wp=new Path2D(); wp.moveTo(0,groundTop);
  for(var i=0;i<shorePts.length;i++) wp.lineTo(shorePts[i].x,shorePts[i].y);
  wp.lineTo(0,H); wp.closePath();
  var water=g.createLinearGradient(0,groundTop,0,H);
  water.addColorStop(0,'#5ba0a8'); water.addColorStop(1,'#8ac6c6');
  g.fillStyle=water; g.fill(wp);
  g.save(); g.clip(wp);
  var wd=g.createLinearGradient(0,groundTop,0,groundTop+(H-groundTop)*0.5);
  wd.addColorStop(0,'rgba(40,90,100,0.25)'); wd.addColorStop(1,'rgba(40,90,100,0)');
  g.fillStyle=wd; g.fillRect(0,groundTop,W,H);
  g.restore();
  g.lineJoin='round'; g.lineCap='round';
  g.beginPath(); g.moveTo(shorePts[0].x,shorePts[0].y);
  for(var j=0;j<shorePts.length;j++) g.lineTo(shorePts[j].x,shorePts[j].y);
  g.lineWidth=13; g.strokeStyle='rgba(233,217,178,0.92)'; g.stroke();
  g.lineWidth=4; g.strokeStyle='rgba(245,233,202,0.95)'; g.stroke();
  drawGrassTexture(g); drawFlowers(g); drawPebbles(g);
}
function drawGrassTexture(g){
  var areaGrass=(W*(H-groundTop))*0.5;
  var n=Math.min(1500,Math.floor(areaGrass/1400));
  var cols=['#8cc06a','#9ccf79','#79ab5d','#b6da97','#6fa052'];
  for(var i=0;i<n;i++){
    var y=rand(groundTop+4,H), x=rand(0,W);
    if(x<shoreX(y)+9) continue;
    var len=rand(3,7)*depthScale(y), ang=rand(-0.5,0.5);
    g.strokeStyle=cols[i%cols.length]; g.globalAlpha=0.5; g.lineWidth=rand(0.8,1.6); g.lineCap='round';
    g.beginPath(); g.moveTo(x,y); g.lineTo(x+Math.sin(ang)*len,y-Math.cos(ang)*len); g.stroke();
  }
  g.globalAlpha=1;
}
function drawFlowers(g){
  var n=Math.min(28,Math.floor((W*(H-groundTop))/9000));
  for(var i=0;i<n;i++){
    var y=rand(groundTop+8,H-4), x=rand(0,W);
    if(x<shoreX(y)+14) continue;
    var ds=depthScale(y), r=rand(1.6,2.6)*ds;
    g.fillStyle=Math.random()<0.5?'#ffffff':'#fff2b0';

// ---------- spawns ----------
function dropPellet(x,y){
  x=clamp(x,12,W-12); y=clamp(y,groundTop+28,H-14);   // keep the pellet within the ducks' reach (not up in the sky above the waterline)
  if(state.pellets.length>=60) state.pellets.shift();

  state.pellets.push({x:x,y:y,z:24*depthScale(y),vz:0,inWater:inWater,claims:0,settled:false,bob:Math.random()*6.283});
  state.lastFeed=state.time; rollSleepDelay();

}
function eatPellet(pe,duck){
  var idx=state.pellets.indexOf(pe); if(idx<0) return;
  state.pellets.splice(idx,1);

  if(Math.random()<0.28) spawnHeart(duck.x,duck.y-30*depthScale(duck.y));
  if(pe.inWater) spawnRipple(pe.x,pe.y,16);
  addCurrency(duck.golden ? GOLD_EARN_PER_PELLET : EARN_PER_PELLET);   // golden ducks pay out 10x
  var di=state.ducks.indexOf(duck); if(di>=0){ _eatenPending[di]=(_eatenPending[di]||0)+1; duck.eaten=(duck.eaten||0)+1; }   // tally this duck's dinner
  audio.nom();
}
function spawnCrumb(x,y){ state.particles.push({type:'crumb',x:x,y:y,vx:rand(-44,44),vy:rand(-60,-26),r:rand(0.9,1.8),t:0,life:rand(0.45,0.8)}); }
function spawnHeart(x,y){ state.particles.push({type:'heart',x:x,y:y,vx:rand(-8,8),vy:-22,s:rand(2.6,3.4),t:0,life:1.1}); }
function spawnTap(x,y){ state.particles.push({type:'ring',x:x,y:y,maxR:22,t:0,life:0.5}); }
function spawnRipple(x,y,maxR){ if(state.ripples.length>60) state.ripples.shift(); state.ripples.push({x:x,y:y,maxR:maxR,r:2,t:0,life:1.1}); }
function spawnZzz(x,y,dir){ state.particles.push({type:'zzz',x:x,y:y,vx:(dir||1)*rand(4,9),vy:rand(-24,-16),s:rand(9,14),t:0,life:rand(1.9,2.6)}); }

function spawnSparkle(x,y){ if(state.particles.length>240) return; state.particles.push({type:'sparkle',x:x,y:y,vy:rand(-10,-3),s:rand(2.4,3.8),rot:rand(0,1.57),t:0,life:rand(0.6,0.95)}); }   // golden duck twinkle

// ---------- food assignment ----------
function assignFood(){
  var pellets=state.pellets, minS=Math.min(W,H), i, dk;
  for(i=0;i<pellets.length;i++) pellets[i].claims=0;
  for(var d=0;d<state.ducks.length;d++){
    dk=state.ducks[d];
    if(dk.state==='eat'||dk.state==='happy'||dk.state==='sleep'||dk.state==='toRoost'||dk.state==='wake'||dk.state==='huddle'||dk.state==='flee'||dk.state==='visit'||dk.state==='chaseFly'||dk.state==='curious'||dk.state==='frogShy'||dk.state==='mimic') continue;
    var best=null,bestScore=Infinity,bestDist=0;
    for(i=0;i<pellets.length;i++){
      var pe=pellets[i];
      var dd=Math.hypot(pe.x-dk.x,pe.y-dk.y);
      var score=dd+pe.claims*(0.1*minS);
      if(score<bestScore){ bestScore=score; best=pe; bestDist=dd; }
    }
    if(best && best.claims>=4 && bestDist>0.22*minS) best=null;
    if(best){ best.claims++; dk.targetPellet=best; dk.state='seek'; }
    else { dk.targetPellet=null; if(dk.state==='seek') dk.pickWander(); }
  }
}

// ---------- updates ----------
function updatePellets(dt){
  var grav=560;
  for(var i=0;i<state.pellets.length;i++){
    var pe=state.pellets[i];
    if(!pe.settled){
      pe.vz+=grav*dt; pe.z-=pe.vz*dt;
      if(pe.z<=0){ pe.z=0;
        if(pe.vz>130){ pe.vz=-pe.vz*0.34; }
        else { pe.settled=true; pe.vz=0; if(pe.inWater) spawnRipple(pe.x,pe.y,15); }
      }
    } else if(pe.inWater){ pe.bob+=dt*2.3; }
  }
}
function updateParticles(dt){
  var g=560;
  for(var i=state.particles.length-1;i>=0;i--){
    var p=state.particles[i]; p.t+=dt;
    if(p.type==='crumb'){ p.vy+=g*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }
    else if(p.type==='heart'){ p.y+=p.vy*dt; p.vy+=10*dt; p.x+=p.vx*dt; }
    else if(p.type==='zzz'){ p.y+=p.vy*dt; p.x+=p.vx*dt; }
    else if(p.type==='drop'){ p.vy+=g*dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
      if(p.life-p.t<dt && isWater(p.x,p.y)) spawnRipple(p.x,p.y,8); }   // little plip where rain lands on the pond
    else if(p.type==='sparkle'){ p.y+=p.vy*dt; }
    if(p.t>=p.life) state.particles.splice(i,1);
  }
}
function updateRipples(dt){
  for(var i=state.ripples.length-1;i>=0;i--){
    var r=state.ripples[i]; r.t+=dt; r.r=2+(r.maxR-2)*(r.t/r.life);
    if(r.t>=r.life) state.ripples.splice(i,1);
  }
}
function updateClouds(dt){
  for(var i=0;i<state.clouds.length;i++){ var c=state.clouds[i]; c.x+=c.sp*dt; if(c.x>W+90) c.x=-90; }
}

function manageSleep(){
  var ducks=state.ducks, i, d;
  if(state.alarm||state.friend||state.dfChaser||state.frogChaser) return; // a visitor has the flock's attention; no napping
  if(state.sleeping){
    // Any fresh food wakes the whole flock.
    if(state.pellets.length>0){
      state.sleeping=false;
      for(i=0;i<ducks.length;i++){ d=ducks[i]; if(d.state==='sleep'||d.state==='toRoost') d.startWake(); }
    }
    return;
  }
  // Don't drift off mid-meal or mid-celebration.
  if(state.pellets.length>0) return;
  var delay=(weather.loaded && weather.isDay===0) ? Math.min(state.sleepDelay,12) : state.sleepDelay;   // settle to roost soon after dark
  if(state.time-state.lastFeed<delay) return;
  for(i=0;i<ducks.length;i++){ var s=ducks[i].state; if(s==='seek'||s==='eat'||s==='happy'||s==='wake'||s==='mimic') return; }
  // Time to roost.
  var cx=0,cy=0,n=ducks.length||1;
  for(i=0;i<ducks.length;i++){ cx+=ducks[i].x; cy+=ducks[i].y; }
  cx=clamp(cx/n,40,W-40); cy=clamp(cy/n,groundTop+40,H-40);
  var atNight=(computeSky().night>0.4);
  state.roost={x:cx,y:cy}; state.sleeping=true;
  for(i=0;i<ducks.length;i++){
    d=ducks[i];
    if(atNight){   // at night they tuck in a tidy line along the bank, just up on the grass
      var ry=clamp(cy+(i-(n-1)/2)*24,groundTop+30,H-30);
      d.tx=clamp(shoreX(ry)+20+(i%2)*9,30,W-26); d.ty=ry;
    } else {       // daytime nap: a loose golden-angle huddle wherever they are
      var ang=i*2.399963, rad=20+(i%3)*13;
      d.tx=clamp(cx+Math.cos(ang)*rad,26,W-26); d.ty=clamp(cy+Math.sin(ang)*rad,groundTop+26,H-26);
    }
    d.state='toRoost'; d.stateT=0; d.targetPellet=null;
  }
}

// ---------- visitors (random cute guests) ----------
function flockCentroid(){ // centre of the calm flock — ignores the one being chased
  var cx=0,cy=0,n=0,i,d;
  for(i=0;i<state.ducks.length;i++){ d=state.ducks[i]; if(d.state==='flee'||d===state.chased) continue; cx+=d.x; cy+=d.y; n++; }
  if(n===0){ for(i=0;i<state.ducks.length;i++){ cx+=state.ducks[i].x; cy+=state.ducks[i].y; } n=state.ducks.length||1; }
  return {x:cx/n,y:cy/n};
}
function nearestDuck(x,y){ var best=null,bd=Infinity; for(var i=0;i<state.ducks.length;i++){ var d=state.ducks[i],dd=Math.hypot(d.x-x,d.y-y); if(dd<bd){ bd=dd; best=d; } } return best; }
function landX(y,pad){ return shoreX(y)+(pad||16); } // keep land animals out of the water
function spookFlock(cat){ // a pounce just landed: send every duck scarpering in all directions
  state.scare=1;
  for(var i=0;i<state.ducks.length;i++){
    var d=state.ducks[i], away=Math.atan2(d.y-cat.y,d.x-cat.x);
    d.panicAng=away+rand(-1.7,1.7); d.panicT=rand(1.3,2.4); // wide, dramatic, all-directions
  }
}
function scootDucks(x,y,radius){ // a gentle, local startle (e.g. the dog's splash): nearby ducks scoot off briefly, then carry on
  for(var i=0;i<state.ducks.length;i++){ var d=state.ducks[i];
    if(d.state!=='wander'&&d.state!=='pause'&&d.state!=='peck'&&d.state!=='seek') continue;
    if(Math.hypot(d.x-x,d.y-y)<radius){ d.state='spooked'; d.scootX=x; d.scootY=y; d.shyT=rand(0.5,1.0); d.targetPellet=null; }
  }
}

// Registry of visitor makers. Add new animals here; one is picked at random per visit.
// Each visitor has a display name (for the shop) and a maker. Add new animals here and they
// auto-appear both in the random rotation and in the "call a visitor" shop.
var VISITORS=[
  { id:'cat',   name:'Ginger cat', make:function(){ return new Cat(); } },
  { id:'koi',   name:'Koi fish',   make:function(){ return new Koi(); } },
  { id:'panda', name:'Red panda',  make:function(){ return new RedPanda(); } },
  { id:'stork', name:'Stork',      make:function(){ return new Stork(); } },
  { id:'dragonfly', name:'Dragonflies', make:function(){ return new Dragonfly(); } },
  { id:'frog',  name:'Frogs',      make:function(){ return new FrogFamily(); } },
  { id:'giraffe', name:'Giraffe',  make:function(){ return new Giraffe(); } },
  { id:'otters', name:'Otters',    make:function(){ return new Otters(); } },
  { id:'penguin', name:'Penguin',  make:function(){ return new Penguin(); } },
  { id:'shark', name:'Shark',      make:function(){ return new Shark(); } },
  { id:'elephant', name:'Elephant', make:function(){ return new Elephant(); } },
  { id:'dog', name:'Dog',          make:function(){ return new Dog(); } },
  { id:'capybara', name:'Capybara', make:function(){ return new Capybara(); } }
];
function visitorById(id){ for(var i=0;i<VISITORS.length;i++) if(VISITORS[i].id===id) return VISITORS[i]; return null; }
function unlockedVisitors(){ var r=[]; for(var i=0;i<VISITORS.length;i++) if(state.unlocked&&state.unlocked[VISITORS[i].id]) r.push(VISITORS[i]); return r; }
// Summon a specific guest right now (used by the shop), clearing any current one first.
function summonVisitor(maker){
  if(state.visitor){
    if(state.visitor.spooks||state.visitor.befriends){ for(var i=0;i<state.ducks.length;i++){ state.ducks[i].pickIdle(); state.ducks[i].friendDecided=false; } }
    if(state.dfChaser) state.dfChaser.pickIdle();
    if(state.frogChaser) state.frogChaser.pickIdle();
    for(var mj=0;mj<state.ducks.length;mj++){ var ms=state.ducks[mj].state; if(ms==='mimic'||ms==='ride'||ms==='toGiraffe'||ms==='onCapy'||ms==='toCapy') state.ducks[mj].pickIdle(); }
    state.alarm=null; state.huddle=null; state.scare=0; state.chased=null; state.friend=null; state.dfChaser=null; state.dfTarget=null; state.frogChaser=null; state.frogTarget=null; state.giraffeMount=null; state.capyMount=null;
  }
  state.visitor=maker();
  scheduleNextVisitor();
}

function scheduleNextVisitor(){ state.nextVisitor=state.time+rand(VISITOR_MIN,VISITOR_MAX); }

function manageVisitor(dt){
  if(state.visitor){
    state.visitor.update(dt);
    state.scare=Math.max(0,(state.scare||0)-dt*1.6); // startle fades
    if(state.visitor.spooks){
      // Flock reaction: wake, gather and keep wary of the guest.
      state.sleeping=false; state.alarm=state.visitor;
      var fc=flockCentroid(), v=state.visitor;
      var dx=fc.x-v.x, dy=fc.y-v.y, dd=Math.hypot(dx,dy)||1;
      // Hold a loose huddle in place while he creeps up (push 0 = gather, don't flee);
      // only bolt away when he actually pounces (scare spikes). The per-duck slot radius keeps them spread, not stacked.
      var push=(state.scare||0)*78;
      state.huddle={ x:clamp(fc.x+dx/dd*push,28,W-28), y:clamp(fc.y+dy/dd*push,groundTop+28,H-28) };
      for(var i=0;i<state.ducks.length;i++){
        var dk=state.ducks[i];
        if(dk===state.chased) continue; // the unlucky one is busy running for its life
        if(dk.state!=='huddle'&&dk.state!=='flee'){ dk.state='huddle'; dk.huddleSlot=i; dk.targetPellet=null; }
      }
    } else if(state.visitor.befriends){
      // Friendly guest: nearby ducks wander over to say hello (not all of them, and only as it gets close).
      state.sleeping=false; state.friend=state.visitor; var vf=state.visitor;
      for(var i=0;i<state.ducks.length;i++){
        var dk=state.ducks[i];
        if(dk.state==='visit'||dk.friendDecided) continue;
        if(Math.hypot(dk.x-vf.x,dk.y-vf.y)<130){ dk.friendDecided=true; if(Math.random()<0.72){ dk.state='visit'; dk.huddleSlot=i; dk.targetPellet=null; } }
      }
    } else if(state.visitor.lures){
      // Dragonflies: one idle duck takes the bait and chases a fly; it can never catch it and soon loses interest.
      var sw=state.visitor;
      if(state.dfChaser){
        state.dfChaser.chaseT-=dt;
        if(state.dfChaser.chaseT<=0 || !state.dfTarget || sw.lifeT>sw.life){ state.dfChaser.pickIdle(); state.dfChaser=null; state.dfTarget=null; }
      } else if(sw.lifeT<sw.life-2){
        for(var fi=0;fi<sw.flies.length && !state.dfChaser;fi++){ var f=sw.flies[fi];
          for(var di=0;di<state.ducks.length;di++){ var dk=state.ducks[di];
            if(dk.state!=='wander'&&dk.state!=='pause'&&dk.state!=='peck') continue;  // only a duck that's just pottering about
            if(Math.hypot(dk.x-f.x,dk.y-f.y)<64 && Math.random()<dt*1.6){ dk.state='chaseFly'; dk.chaseTarget=f; dk.chaseT=rand(2.5,5.5); dk.targetPellet=null; state.dfChaser=dk; state.dfTarget=f; break; }
          }
        }
      }
    } else if(state.visitor.curious){
      // Frogs: one nosy duck waddles up; when it gets close the frog leaps away and the duck startles back, over and over.
      var fam=state.visitor, parent=fam.parent; state.frogTarget=parent;
      if(state.frogChaser){
        var fd=state.frogChaser; fd.curiosityT-=dt;
        if(fd.curiosityT<=0 || fam.lifeT>fam.life){ fd.pickIdle(); state.frogChaser=null; state.frogTarget=null; }
        else if(fd.state==='curious'){ if(Math.hypot(fd.x-parent.x,fd.y-parent.y)<40){ fam.startle(fd); fd.state='frogShy'; fd.shyT=rand(0.6,1.2); } }
        else if(fd.state==='frogShy'){ if(fd.shyT<=0) fd.state='curious'; }
      } else if(fam.lifeT<fam.life-3){
        for(var ci=0;ci<state.ducks.length;ci++){ var cd=state.ducks[ci];
          if(cd.state!=='wander'&&cd.state!=='pause'&&cd.state!=='peck') continue;
          if(Math.hypot(cd.x-parent.x,cd.y-parent.y)<140 && Math.random()<dt*0.7){ cd.state='curious'; cd.curiosityT=rand(7,13); cd.targetPellet=null; state.frogChaser=cd; state.frogTarget=parent; break; }
        }
      }
    } else if(state.visitor.mimic){
      // Stork: while it fishes, nearby ducks line up at the waterside one by one and copy it.
      var stk=state.visitor;
      if(stk.state==='flyIn'||stk.state==='land'||stk.state==='peck'){
        var mc=0; for(var mi=0;mi<state.ducks.length;mi++) if(state.ducks[mi].state==='mimic') mc++;
        if(stk.state==='peck' && mc<6 && Math.random()<dt*0.5){       // recruit a nearby idle duck every couple of seconds
          var best=null,bd=170;
          for(var ri=0;ri<state.ducks.length;ri++){ var rd=state.ducks[ri];
            if(rd.state!=='wander'&&rd.state!=='pause'&&rd.state!=='peck') continue;
            var rdd=Math.hypot(rd.x-stk.x,rd.y-stk.y); if(rdd<bd){ bd=rdd; best=rd; }
          }
          if(best){ best.state='mimic'; best.mimicSlot=mc; best.mimicPeckT=rand(0.5,1.8); best.mimicPeckPhase=0; best.targetPellet=null; }
        }
      } else { // taking off — everyone go back to normal
        for(var li=0;li<state.ducks.length;li++) if(state.ducks[li].state==='mimic') state.ducks[li].pickIdle();
      }

          } else if(gir.approachT<=0 || gir.state==='leave'){ rdr.pickIdle(); gir.rider=null; }  // gave up / giraffe leaving
        } else if(rdr.state==='ride'){
          gir.rideT-=dt;
          if(Math.random()<dt*0.25) spawnHeart(gir.x+rand(-6,6), gir.y-74*depthScale(gir.y));   // happy little hearts up top
          if(gir.rideT<=0 || gir.state==='leave'){                                       // hop down beside the giraffe
            rdr.x=clamp(gir.x-gir.facing*24,16,W-16); rdr.y=clamp(gir.y+8,groundTop+16,H-16);
            rdr.vx=0; rdr.vy=0; rdr.hop=5; rdr.pickIdle(); gir.rider=null;

      }

      var cap=state.visitor;
      state.capyMount={ x:clamp(cap.x+cap.facing*20,16,W-16), y:clamp(cap.y+8,groundTop+16,H-16) };   // climb-on spot beside it
      if(cap.rider){

        if(crd.state==='toCapy'){

          else if(cap.state!=='loaf'&&cap.state!=='settle'){ crd.pickIdle(); cap.rider=null; }   // gave up
        } else if(crd.state==='onCapy'){
          if(cap.state!=='loaf'){ crd.x=clamp(cap.x-cap.facing*24,16,W-16); crd.y=clamp(cap.y+8,groundTop+16,H-16); crd.vx=0; crd.vy=0; crd.pickIdle(); cap.rider=null; }   // capy getting up → hop down
        } else cap.rider=null;
      } else if(cap.state==='loaf' && cap.loaf>0.6 && cap.lifeT<cap.life-4){
        var cpick=null, cpd=170;
        for(var ci2=0;ci2<state.ducks.length;ci2++){ var cdk=state.ducks[ci2];
          if(cdk.state!=='wander'&&cdk.state!=='pause'&&cdk.state!=='peck') continue;
          var cdd=Math.hypot(cdk.x-cap.x,cdk.y-cap.y); if(cdd<cpd){ cpd=cdd; cpick=cdk; }
        }
        if(cpick && Math.random()<dt*0.9){ cpick.state='toCapy'; cpick.targetPellet=null; cap.rider=cpick; }
      }
    }
    if(state.visitor.done){
      var wasReact=state.visitor.spooks||state.visitor.befriends;
      if(state.dfChaser){ state.dfChaser.pickIdle(); }
      if(state.frogChaser){ state.frogChaser.pickIdle(); }
      for(var mj=0;mj<state.ducks.length;mj++){ var ms=state.ducks[mj].state; if(ms==='mimic'||ms==='ride'||ms==='toGiraffe'||ms==='spooked'||ms==='onCapy'||ms==='toCapy') state.ducks[mj].pickIdle(); }
      state.giraffeMount=null; state.capyMount=null;
      state.visitor=null; state.alarm=null; state.huddle=null; state.scare=0; state.chased=null; state.friend=null; state.dfChaser=null; state.dfTarget=null; state.frogChaser=null; state.frogTarget=null;
      if(wasReact){ for(var j=0;j<state.ducks.length;j++){ state.ducks[j].pickIdle(); state.ducks[j].friendDecided=false; } state.lastFeed=state.time; rollSleepDelay(); }
      if(state.time>=state.nextVisitor) scheduleNextVisitor();   // countdown already started at arrival; only re-roll if the visit outlasted it
    }

  if(state.time>=state.nextVisitor && state.pellets.length===0){
    var pool=unlockedVisitors();                       // only guests you've bought show up
    if(pool.length){ state.visitor=pool[randi(0,pool.length-1)].make(); scheduleNextVisitor(); }  // start the next countdown from arrival
    else scheduleNextVisitor();                          // none unlocked yet — check again later
  }
}

// ----- Ginger cat: saunters in, play-stalks the ducks, pounces, wanders off -----
function Cat(){
  this.kind='cat'; this.spooks=true; this.done=false;
  this.y=clamp(groundTop+(H-groundTop)*rand(0.30,0.80),groundTop+50,H-50);
  this.x=W+34; this.facing=-1;             // strolls in from the right (always grass)
  this.vx=0; this.vy=0; this.speed=0; this.walkPhase=0;
  this.state='enter'; this.stateT=0; this.lifeT=0; this.life=rand(20,30);
  this.crouch=0; this.hop=0; this.lunge=0; this.tail=Math.random()*6.283; this.blink=0; this.blinkT=rand(1.5,4);
  this.meowT=rand(1.5,4); this.wakeT=0; this.pounced=false; this.pounceRange=rand(74,104);
  this.tx=clamp(W*rand(0.6,0.85),60,W-30); this.ty=this.y;
}
Cat.prototype.aim=function(toFlock,opts){
  opts=opts||{};
  var t = toFlock? flockCentroid() : {x:this.tx,y:this.ty};
  var ty=clamp(t.y,groundTop+40,H-40);
  var tx=t.x;
  if(!opts.water) tx=Math.max(tx, landX(ty,opts.pad||18)); // entering/leaving: stay on grass
  if(opts.stopAt){ var dx=tx-this.x, dy=ty-this.y, dd=Math.hypot(dx,dy)||1; tx=this.x+dx/dd*Math.max(0,dd-opts.stopAt); ty=this.y+dy/dd*Math.max(0,dd-opts.stopAt); }
  this.tx=clamp(tx,30,W+40); this.ty=ty;
};
Cat.prototype.update=function(dt){
  this.stateT+=dt; this.lifeT+=dt; this.tail+=dt*(this.state==='stalk'?6:3);
  var maxSpeed=0, crouchTarget=0;
  if(this.state==='enter'){ this.aim(false); maxSpeed=64;
    if(Math.hypot(this.tx-this.x,this.ty-this.y)<8){ this.state='stalk'; this.stateT=0; this.pounced=false; }
  } else if(this.state==='stalk'){ this.aim(true,{water:true});
    var fcs=flockCentroid(), dToFlock=Math.hypot(fcs.x-this.x,fcs.y-this.y);
    if(dToFlock>150){ maxSpeed=58; crouchTarget=0.3; }    // still far: trot over to get near
    else { maxSpeed=30; crouchTarget=0.85; }              // close enough: drop low and creep
    // only pounce once he's actually within striking distance (so he lands near them, not on empty space)
    if((this.stateT>0.5 && dToFlock<this.pounceRange) || this.stateT>9){ this.state='pounce'; this.stateT=0; this.lunge=0; this.hop=0; this.pounceRange=rand(74,104); }
  } else if(this.state==='pounce'){ this.aim(true,{water:true,stopAt:16}); maxSpeed=170; crouchTarget=0.15;
    this.lunge=Math.min(1,this.stateT*6); this.hop=Math.sin(clamp(this.stateT/0.5,0,1)*Math.PI)*6;
    if(!this.pounced){ var fcp=flockCentroid(); if(Math.hypot(fcp.x-this.x,fcp.y-this.y)<58){ spookFlock(this); this.pounced=true; } } // they scatter as he commits to the pounce
    if(this.stateT>0.5){ this.state='recover'; this.stateT=0; }
  } else if(this.state==='recover'){ maxSpeed=0; crouchTarget=0.1; this.lunge=0;
    if(this.stateT>rand(0.5,0.9)){
      if(this.lifeT>this.life){ this.state='leave'; this.stateT=0; this.tx=W+60; this.ty=clamp(this.y,groundTop+40,H-40); }
      else { // single out the nearest (unlucky) duck and give chase
        var prey=nearestDuck(this.x,this.y);
        if(prey){ state.chased=prey; prey.state='flee'; prey.panicT=0; this.state='chase'; this.stateT=0; this.chaseDur=rand(3.5,6.5); }
        else { this.state='stalk'; this.stateT=0; this.pounced=false; }
      }
    }
  } else if(this.state==='chase'){ crouchTarget=0.1; maxSpeed=84; // determined, but a touch slower than a sprinting duck
    var ch=state.chased;
    if(ch){ this.tx=ch.x; this.ty=ch.y; }
    if(!ch || this.stateT>this.chaseDur){
      if(ch){ ch.state='huddle'; ch.panicT=0; } state.chased=null;
      if(this.lifeT>this.life){ this.state='leave'; this.stateT=0; this.tx=W+60; this.ty=clamp(this.y,groundTop+40,H-40); }
      else { this.state='stalk'; this.stateT=0; this.pounced=false; }
    }
  } else if(this.state==='leave'){ this.aim(false); maxSpeed=78;
    if(this.x>W+30) this.done=true;
  }
  // In water he's a bit slower than on land (85%) — but still quick; the ducks rely on out-running him.
  var inWater=isWater(this.x,this.y);

  var dx=this.tx-this.x, dy=this.ty-this.y, dd=Math.hypot(dx,dy)||1;
  var desVx=0,desVy=0; if(maxSpeed>0&&dd>2){ desVx=dx/dd*maxSpeed; desVy=dy/dd*maxSpeed; }
  var steer=Math.min(1,dt*(this.state==='pounce'?12:6));
  this.vx+=(desVx-this.vx)*steer; this.vy+=(desVy-this.vy)*steer;
  this.x+=this.vx*dt; this.y+=this.vy*dt;
  this.y=clamp(this.y,groundTop+30,H-20);
  this.speed=Math.hypot(this.vx,this.vy);
  if(Math.abs(this.vx)>5) this.facing=this.vx>0?1:-1;
  this.walkPhase+=dt*(2.5+this.speed*0.06);
  this.crouch+=(crouchTarget-this.crouch)*Math.min(1,dt*5);
  this.inWater=inWater;
  if(inWater&&this.speed>6){ this.wakeT-=dt; if(this.wakeT<=0){ spawnRipple(this.x-this.facing*6*depthScale(this.y),this.y+6,12); this.wakeT=0.3; } }
  this.blink-=dt; this.blinkT-=dt; if(this.blinkT<=0){ this.blink=0.12; this.blinkT=rand(1.8,4.5); }
  this.meowT-=dt; if(this.meowT<=0 && this.state!=='leave'){ audio.meow(); this.meowT=rand(4.5,9.5); }
};

// ----- Koi: a calm fish that glides under the pond and pops up to the surface now and then -----
function waterPoint(){ // a random spot comfortably inside the water
  for(var k=0;k<12;k++){ var y=rand(groundTop+24,H-24), edge=shoreX(y)-20; if(edge>30) return {x:rand(20,edge),y:y}; }
  return {x:30,y:groundTop+(H-groundTop)*0.5};
}
function makeKoiFish(){ // one fish in the school
  var p=waterPoint(), t=waterPoint();
  var f={ x:p.x, y:p.y, heading:rand(0,6.283), speed:0,
    tail:rand(0,6.283), surface:0, surfacing:false, surfT:0, surfDur:0, nextSurf:rand(1.5,5.5),
    tx:t.x, ty:t.y,
    pal: Math.random()<0.5 ? {base:'#f4f1ec',patch:'#e8702a',spot:'#cf5a1c'} : {base:'#f0a23a',patch:'#cf5a1c',spot:'#f7ede0'} };
  f.vx=Math.cos(f.heading)*6; f.vy=Math.sin(f.heading)*6;
  return f;
}
function updateKoiFish(f,dt,canSurface){
  f.tail+=dt*(5+f.speed*0.06);
  var dx=f.tx-f.x, dy=f.ty-f.y, dd=Math.hypot(dx,dy)||1;
  if(dd<14){ var t=waterPoint(); f.tx=t.x; f.ty=t.y; }
  var maxSpeed=20+f.surface*8;
  f.vx+=(dx/dd*maxSpeed-f.vx)*Math.min(1,dt*1.8); f.vy+=(dy/dd*maxSpeed-f.vy)*Math.min(1,dt*1.8);
  f.x+=f.vx*dt; f.y+=f.vy*dt;
  var edge=shoreX(f.y)-14;
  if(f.x>edge){ f.x=edge; f.vx-=Math.abs(f.vx)*0.6+6; }
  f.x=clamp(f.x,12,W); f.y=clamp(f.y,groundTop+18,H-14);
  f.speed=Math.hypot(f.vx,f.vy);
  if(f.speed>3) f.heading=Math.atan2(f.vy,f.vx);
  if(f.surfacing){
    f.surfT+=dt; f.surface=Math.sin(clamp(f.surfT/f.surfDur,0,1)*Math.PI);
    if(f.surfT>=f.surfDur){ f.surfacing=false; f.surface=0; f.nextSurf=rand(4.5,10); }
  } else {
    f.surface+=(0-f.surface)*Math.min(1,dt*4);
    f.nextSurf-=dt;
    if(f.nextSurf<=0 && canSurface){ f.surfacing=true; f.surfT=0; f.surfDur=rand(1.3,2.4); spawnRipple(f.x,f.y,14); audio.bloop(); }
  }
  if(f.surfacing && f.surface>0.4 && Math.random()<dt*3) spawnRipple(f.x+rand(-4,4),f.y+rand(-3,3),9);
}
function Koi(){ // a small school of koi (ducks pay them no mind)
  this.kind='koi'; this.spooks=false; this.done=false;
  this.life=rand(24,38); this.lifeT=0;
  this.fish=[]; for(var i=0;i<3;i++) this.fish.push(makeKoiFish());
  this.y=this.fish[0].y;
}
Koi.prototype.update=function(dt){
  this.lifeT+=dt;
  var canSurface=this.lifeT<this.life, sy=0, allDown=true;
  for(var i=0;i<this.fish.length;i++){ var f=this.fish[i]; updateKoiFish(f,dt,canSurface); sy+=f.y; if(f.surface>=0.05) allDown=false; }
  this.y=sy/this.fish.length;             // average y for depth sorting
  if(this.lifeT>this.life && allDown) this.done=true;
};

// ----- Otters: a pair float on their backs holding paws, drifting gently around the pond -----
function Otters(){

// ----- Penguin: waddles in, belly-slides across the shore into the water with a splash, porpoises, climbs out, repeat -----

  this.waddle=rand(0,6.283); this.blink=0; this.blinkT=rand(1.5,4); this.splashed=false; this.swimT=0; this.prone=false;

  this.blink-=dt; this.blinkT-=dt; if(this.blinkT<=0){ this.blink=0.12; this.blinkT=rand(1.8,4.5); }

// ----- Shark: a fin circles the pond, then erupts up Jaws-style; the ducks scarper but none are harmed -----

function giraffeBackPoint(g){ var s=depthScale(g.y)*GIRAFFE_S; return { x:g.x+g.facing*(-3)*s, y:g.y-(g.bob||0)*s*0.4 + (-70)*s }; }

// ----- Stork: glides in from the sky, lands at the waterside, fishes a while, then flies off -----
function Stork(){
  this.kind='stork'; this.spooks=false; this.mimic=true; this.done=false;
  this.landY=clamp(groundTop+(H-groundTop)*rand(0.30,0.72),groundTop+70,H-90);
  this.landX=clamp(shoreX(this.landY)-5,30,W-30);          // right at the water's edge
  var side=Math.random()<0.5?-1:1;
  this.x=clamp(this.landX+side*rand(90,170),16,W-16); this.y=-50;   // start above the screen
  this.facing=this.landX>this.x?1:-1; this.vx=0; this.vy=0; this.speed=0;
  this.state='flyIn'; this.stateT=0; this.lifeT=0; this.life=rand(13,22);
  this.flap=rand(0,6.283); this.wing=1; this.headDip=0; this.peckT=rand(0.5,1.3); this.blink=0; this.blinkT=rand(2,5);
}
Stork.prototype.update=function(dt){
  this.stateT+=dt;
  var maxSpeed=0, tx=this.tx, ty=this.ty, flapRate=8, wingTarget=1;
  if(this.state==='flyIn'){ tx=this.landX; ty=this.landY; maxSpeed=120; flapRate=8; wingTarget=1;
    if(Math.hypot(tx-this.x,ty-this.y)<10){ this.state='land'; this.stateT=0; this.facing=-1; }
  } else if(this.state==='land'){ maxSpeed=0; wingTarget=0; flapRate=5; this.facing=-1;
    if(this.stateT>0.5){ this.state='peck'; this.stateT=0; }
  } else if(this.state==='peck'){ maxSpeed=0; wingTarget=0; this.facing=-1; this.lifeT+=dt;
    this.peckT-=dt;
    if(this.peckT<=0){ this.peckT=rand(1.1,2.6); this.peckPhase=0.0001; }       // start a peck
    if(this.peckPhase>0){ this.peckPhase+=dt; var pr=clamp(this.peckPhase/0.55,0,1); this.headDip=Math.sin(pr*Math.PI);
      if(pr>0.46 && pr<0.56) spawnRipple(shoreX(this.y)-8,this.y,11);            // beak hits the water
      if(pr>=1){ this.peckPhase=0; this.headDip=0; } }
    if(this.lifeT>this.life){ this.state='flyOut'; this.stateT=0; this.tx=clamp(this.x+(this.x<W*0.5?-1:1)*240,-80,W+80); this.ty=-70; }
  } else if(this.state==='flyOut'){ tx=this.tx; ty=this.ty; maxSpeed=130; flapRate=9; wingTarget=1;
    if(this.y<-50) this.done=true;
  }
  var dx=tx-this.x, dy=ty-this.y, dd=Math.hypot(dx,dy)||1;
  var desVx=0,desVy=0; if(maxSpeed>0&&dd>2){ desVx=dx/dd*maxSpeed; desVy=dy/dd*maxSpeed; }
  var steer=Math.min(1,dt*4);
  this.vx+=(desVx-this.vx)*steer; this.vy+=(desVy-this.vy)*steer;
  this.x+=this.vx*dt; this.y+=this.vy*dt;
  this.speed=Math.hypot(this.vx,this.vy);
  if(Math.abs(this.vx)>6 && (this.state==='flyIn'||this.state==='flyOut')) this.facing=this.vx>0?1:-1;
  this.flap+=dt*flapRate;
  this.wing+=(wingTarget-this.wing)*Math.min(1,dt*8);
  this.blink-=dt; this.blinkT-=dt; if(this.blinkT<=0){ this.blink=0.12; this.blinkT=rand(2,5); }
};

// ----- Dragonflies: a couple of them dart over the pond; one duck may give chase (and never wins) -----
function overWaterPoint(){
  for(var k=0;k<12;k++){ var y=rand(groundTop+20,H-30), edge=shoreX(y)-12; if(edge>34) return {x:rand(16,edge),y:y}; }
  return {x:40,y:groundTop+(H-groundTop)*0.5};
}
function makeDfly(){
  var p=overWaterPoint(), t=overWaterPoint();
  return { x:p.x,y:p.y,vx:0,vy:0,facing:1,speed:0,wing:rand(0,6.28),tx:t.x,ty:t.y,retargetT:rand(0.4,1.1),hover:0,
    col: Math.random()<0.5 ? {body:'#2bb6a0',dark:'#1d7d6f'} : {body:'#3f7fd6',dark:'#2a589a'} };
}
function updateDfly(f,dt,leaving){
  f.wing+=dt*46;
  if(!leaving && f===state.dfTarget && state.dfChaser){
    // being chased: steer by heading with a capped turn rate, so it banks in smooth curves (never spins) and arcs toward open water
    var c=state.dfChaser, ax=f.x-c.x, ay=f.y-c.y, al=Math.hypot(ax,ay)||1, dirx=ax/al, diry=ay/al;
    var sx=shoreX(f.y), M=120, wx=0, wy=0;                   // wall avoidance starts early, so the turn is gradual
    if(f.x-8<M) wx+=(M-(f.x-8))/M;
    if(sx-f.x<M) wx-=(M-(sx-f.x))/M;
    if(f.y-groundTop<M) wy+=(M-(f.y-groundTop))/M;
    if(H-f.y<M) wy-=(M-(H-f.y))/M;
    var ddx=dirx+wx*1.25, ddy=diry+wy*1.25;
    var want=Math.atan2(ddy,ddx);
    if(!f._flee){ f.heading=Math.atan2(f.vy,f.vx); f._flee=true; }   // seed heading from current motion on the first frame
    var da=want-f.heading; while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;
    f.heading+=clamp(da,-6.5*dt,6.5*dt);                     // limited turn rate => smooth banking
    var sp=190; f.vx=Math.cos(f.heading)*sp; f.vy=Math.sin(f.heading)*sp;
    f.x+=f.vx*dt; f.y+=f.vy*dt; f.x=clamp(f.x,8,shoreX(f.y)-6); f.y=clamp(f.y,groundTop+8,H-12);
    f.speed=sp; if(Math.abs(f.vx)>4) f.facing=f.vx>0?1:-1;
    return;
  }
  f._flee=false;
  var maxSpeed=140;
  if(f.hover>0){ f.hover-=dt; maxSpeed=12; }
  if(leaving){ f.tx=f.x; f.ty=-110; maxSpeed=180; f.hover=0; }   // zip straight up and off the screen
  else if(f.hover<=0){                                    // wander erratically over the water
    f.retargetT-=dt;
    if(f.retargetT<=0 || Math.hypot(f.tx-f.x,f.ty-f.y)<12){ var p=overWaterPoint(); f.tx=p.x; f.ty=p.y; f.retargetT=rand(0.4,1.2); if(Math.random()<0.3) f.hover=rand(0.3,0.8); }
  }
  var dx=f.tx-f.x, dy=f.ty-f.y, dd=Math.hypot(dx,dy)||1;
  var st=Math.min(1,dt*8);                                  // snappy, darty acceleration
  f.vx+=(dx/dd*maxSpeed-f.vx)*st; f.vy+=(dy/dd*maxSpeed-f.vy)*st;
  f.x+=f.vx*dt; f.y+=f.vy*dt;
  var yLo=leaving?-130:groundTop+8;                          // let them rise off the top when leaving
  f.x=clamp(f.x,8,shoreX(f.y)-6); f.y=clamp(f.y,yLo,H-12);
  f.speed=Math.hypot(f.vx,f.vy); if(Math.abs(f.vx)>4) f.facing=f.vx>0?1:-1;
}
function Dragonfly(){
  this.kind='dragonfly'; this.spooks=false; this.lures=true; this.done=false;
  this.flies=[makeDfly(), makeDfly()];
  this.life=rand(18,30); this.lifeT=0; this.y=this.flies[0].y;
}
Dragonfly.prototype.update=function(dt){
  this.lifeT+=dt;
  var leaving=this.lifeT>this.life, sy=0, allGone=true;
  for(var i=0;i<this.flies.length;i++){ var f=this.flies[i]; updateDfly(f,dt,leaving); sy+=f.y; if(f.y>-40) allGone=false; }
  this.y=sy/this.flies.length;
  if(leaving && allGone) this.done=true;
};

// ----- Frogs: a big one hops around the waterside with a few babies hopping behind in a line -----
function makeFrog(x,y,size){
  return { x:x,y:y,z:0,facing:1,size:size,squash:1, hopping:false,hopT:0,hopDur:0.34,fromX:x,fromY:y,toX:x,toY:y,hopH:0,restT:rand(0.2,0.7),blink:0,blinkT:rand(1.5,4) };
}
function updateFrog(f,dt,leader,target){
  f.blink-=dt; f.blinkT-=dt; if(f.blinkT<=0){ f.blink=0.1; f.blinkT=rand(1.6,4.5); }
  if(f.hopping){
    f.hopT+=dt; var u=clamp(f.hopT/f.hopDur,0,1);
    f.x=lerp(f.fromX,f.toX,u); f.y=lerp(f.fromY,f.toY,u);
    f.z=Math.sin(u*Math.PI)*f.hopH;
    f.squash=1-Math.sin(u*Math.PI)*0.16;                 // stretch tall in mid-air
    if(u>=1){ f.hopping=false; f.z=0; f.squash=1.3; f.restT=rand(0.22,0.6); }  // landing splat
  } else {
    if(f.squash>1) f.squash=Math.max(1,f.squash-dt*3.4); else if(f.squash<1) f.squash=Math.min(1,f.squash+dt*3.4);
    f.restT-=dt;
    if(f.restT<=0){
      var gx,gy,go=false, step;
      if(leader){ var dx=leader.x-f.x, dy=leader.y-f.y, d=Math.hypot(dx,dy)||1;
        if(d>30){ step=Math.min(18+10*f.size, d-22); gx=f.x+dx/d*step; gy=f.y+dy/d*step; go=step>4; }
      } else if(target){ var dx=target.x-f.x, dy=target.y-f.y, d=Math.hypot(dx,dy)||1;
        if(d>8){ step=Math.min(24,d); gx=f.x+dx/d*step; gy=f.y+dy/d*step; go=true; }
      }
      if(go){ f.fromX=f.x; f.fromY=f.y; f.toX=clamp(gx,12,W-12); f.toY=clamp(gy,groundTop+14,H-14);
        f.hopH=7+f.size*6; f.hopDur=0.3+0.07*f.size; f.hopping=true; f.hopT=0;
        if(Math.abs(f.toX-f.fromX)>1) f.facing=f.toX>f.fromX?1:-1; }
      else f.restT=0.12;
    }
  }
}
function FrogFamily(){
  this.kind='frog'; this.spooks=false; this.curious=true; this.done=false;
  this.life=rand(20,34); this.lifeT=0;
  var y=clamp(groundTop+(H-groundTop)*rand(0.32,0.74),groundTop+60,H-70);
  var sx=clamp(shoreX(y)+rand(8,34),40,W-40);
  this.parent=makeFrog(sx,y,1.0); this.parent.facing=Math.random()<0.5?1:-1;
  this.babies=[]; for(var i=0;i<3;i++) this.babies.push(makeFrog(sx-this.parent.facing*(i+1)*20,y,0.5));
  this.pickTarget(); this.y=y;
}
FrogFamily.prototype.pickTarget=function(){
  var y=clamp(this.parent.y+rand(-130,130),groundTop+44,H-44);
  this.tx=clamp(shoreX(y)+rand(-14,40),26,W-30); this.ty=y;
};
FrogFamily.prototype.startle=function(duck){ // a big leap away from the nosy duck
  var p=this.parent, ax=p.x-duck.x, ay=p.y-duck.y, al=Math.hypot(ax,ay)||1;
  p.fromX=p.x; p.fromY=p.y;
  p.toX=clamp(p.x+ax/al*32,12,W-12); p.toY=clamp(p.y+ay/al*32,groundTop+14,H-14);
  p.hopH=16; p.hopDur=0.32; p.hopping=true; p.hopT=0;
  if(Math.abs(p.toX-p.fromX)>1) p.facing=p.toX>p.fromX?1:-1;
  this.tx=clamp(p.x+ax/al*95,26,W-30); this.ty=clamp(p.y+ay/al*95,groundTop+44,H-44); // keep moving off
};
FrogFamily.prototype.update=function(dt){
  this.lifeT+=dt; var leaving=this.lifeT>this.life;
  var target = leaving ? {x:shoreX(this.parent.y)-30, y:this.parent.y} : {x:this.tx,y:this.ty};
  updateFrog(this.parent,dt,null,target);
  if(!leaving && !this.parent.hopping && Math.hypot(this.tx-this.parent.x,this.ty-this.parent.y)<16) this.pickTarget();
  var leader=this.parent;
  for(var i=0;i<this.babies.length;i++){ updateFrog(this.babies[i],dt,leader,null); leader=this.babies[i]; }
  this.y=this.parent.y;
  if(leaving && isWater(this.parent.x,this.parent.y)){
    spawnRipple(this.parent.x,this.parent.y,15);
    for(var b=0;b<this.babies.length;b++) spawnRipple(this.babies[b].x,this.babies[b].y,9);
    this.done=true;
  }
};

function drawClouds(g){
  var puffs=[[0,0,26,16],[20,4,20,12],[-20,5,20,12],[8,-9,17,12],[-8,-7,15,11]];
  for(var i=0;i<state.clouds.length;i++){

    g.save(); g.translate(c.x,c.y); g.scale(c.sc,c.sc);
    g.fillStyle='rgba(255,255,255,0.55)';
    for(var j=0;j<puffs.length;j++){ var pf=puffs[j]; g.beginPath(); g.ellipse(pf[0],pf[1],pf[2],pf[3],0,0,Math.PI*2); g.fill(); }
    g.fillStyle='rgba(255,255,255,0.4)';
    for(var k=0;k<puffs.length;k++){ var qf=puffs[k]; g.beginPath(); g.ellipse(qf[0],qf[1]-2,qf[2]*0.9,qf[3]*0.9,0,0,Math.PI*2); g.fill(); }

function drawShimmer(g){
  g.save(); g.clip(waterPath);
  var t=state.time, i, x;
  for(i=0;i<5;i++){
    var yy=groundTop+((i+0.6)/5)*(H-groundTop);
    var a=0.04+0.035*(0.5+0.5*Math.sin(t*0.6+i*1.3));
    g.fillStyle='rgba(255,255,255,'+a.toFixed(3)+')';

    for(x=0;x<=W;x+=24) g.lineTo(x,yy+Math.sin(x*0.03+t*0.8+i)*amp);
    g.lineTo(W,yy+10);
    for(x=W;x>=0;x-=24) g.lineTo(x,yy+10+Math.sin(x*0.03+t*0.8+i)*amp);
    g.closePath(); g.fill();
  }
  for(i=0;i<12;i++){

    if(gx<shoreX(gy)-4){

      g.fillStyle='rgba(255,255,255,'+(0.10*tw).toFixed(3)+')';

function drawScene(g){
  var items=[],i;
  for(i=0;i<state.ducks.length;i++) items.push({y:state.ducks[i].y,k:0,o:state.ducks[i]});
  for(i=0;i<state.pellets.length;i++) items.push({y:state.pellets[i].y,k:1,o:state.pellets[i]});
  for(i=0;i<state.lilies.length;i++) items.push({y:state.lilies[i].y,k:2,o:state.lilies[i]});
  for(i=0;i<state.reeds.length;i++) items.push({y:state.reeds[i].y,k:3,o:state.reeds[i]});
  if(state.visitor) items.push({y:state.visitor.y,k:4,o:state.visitor});
  items.sort(function(a,b){return a.y-b.y;});
  for(i=0;i<items.length;i++){

function rrect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }

function drawLilyFlower(g,x,y,r){
